# Trivy secret scanning configuration.
# Docs: https://trivy.dev/docs/latest/scanner/secret/
#
# Each allow-rule is scoped by path and regex so only the specific known
# false-positive pattern is suppressed; real secrets in the same files
# would still be detected.

allow-rules:
  # Test and dev TLS private keys / certs (not production)
  - id: test-dev-private-keys
    description: "Private keys used only for local testing and development"
    path: "(tools/|test/|testdata/|orbit/pkg/insecure/|ee/orbit/pkg/httpsigproxy/)"

  # Sails.js templates: fake Stripe keys (sk_test_, pk_test_, sk_prod__fake_, pk_sandbox__fake_)
  - id: sails-fake-stripe-keys
    description: "Placeholder Stripe keys in Sails.js config templates"
    path: "(website/|ee/fleet-agent-downloader/|ee/vulnerability-dashboard/)"
    regex: "(sk_test_|pk_test_|sk_prod__fake_|sk_sandbox__fake_|pk_sandbox__fake_)"

  # Sails.js templates: fake SendGrid secret
  - id: sails-fake-sendgrid-keys
    description: "Placeholder SendGrid key in Sails.js config templates"
    path: "(website/|ee/fleet-agent-downloader/|ee/vulnerability-dashboard/)"
    regex: "SG\\.fake\\."

  # cmd/fleet/serve.go: hardcoded dev/expired license JWTs for `--dev_license` flag
  - id: dev-license-jwts
    description: "Hardcoded dev license JWT tokens in serve.go"
    path: "cmd/fleet/serve\\.go"
    regex: "eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9\\."

  # Calendars.tsx: GCP service account JSON placeholder shown in the UI
  - id: calendar-gcp-placeholder
    description: "GCP service account JSON placeholder in Calendars UI"
    path: "frontend/pages/admin/IntegrationsPage/cards/Calendars/Calendars\\.tsx"
    regex: "fleet-in-your-calendar"
