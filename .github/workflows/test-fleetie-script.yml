name: Test Fleetie scripts

# Runs the unit tests for the Fleetie scripts on PRs that change either script (or its tests), the
# closer workflow, this workflow, or any handbook markdown file (since handbook edits affect the
# extracted handle list).

on:
  pull_request:
    paths:
      - '.github/scripts/build-fleetie-handles.js'
      - '.github/scripts/build-fleetie-handles.test.js'
      - '.github/scripts/stale-fleetie-issues.js'
      - '.github/scripts/stale-fleetie-issues.test.js'
      - '.github/workflows/close-stale-fleetie-initiated-issues.yml'
      - '.github/workflows/test-fleetie-script.yml'
      - 'handbook/**/*.md'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # 4.4.0
        with:
          node-version: '20'

      - name: Run tests
        run: node --test .github/scripts/build-fleetie-handles.test.js .github/scripts/stale-fleetie-issues.test.js
