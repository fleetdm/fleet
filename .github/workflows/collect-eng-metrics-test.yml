name: Collect engineering metrics test

on:
  push:
    branches:
      - main
      - patch-*
      - prepare-*
    paths:
      - '.github/actions/eng-metrics/**'
  pull_request:
    paths:
      - '.github/actions/eng-metrics/**'
  workflow_dispatch:

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id}}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Supply-chain guard: refuse npm packages younger than 12 hours. See .npmrc.
  NPM_CONFIG_MIN_RELEASE_AGE: 0.5

jobs:
  test:
    name: Test Engineering Metrics Action
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.14.0'
          cache: 'npm'
          cache-dependency-path: '.github/actions/eng-metrics/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: .github/actions/eng-metrics

      - name: Run linting
        run: npm run lint
        working-directory: .github/actions/eng-metrics

      - name: Run tests
        run: npm test
        working-directory: .github/actions/eng-metrics
        env:
          NODE_ENV: test
