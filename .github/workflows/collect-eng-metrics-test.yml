name: Collect engineering metrics test

on:
  push:
    branches:
      - main
      - patch-*
      - prepare-*
    paths:
      - '.github/actions/eng-metrics/**'
  pull_request:
    paths:
      - '.github/actions/eng-metrics/**'
  workflow_dispatch:

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id}}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Supply-chain guard: refuse npm packages younger than 12 hours. See .npmrc.
  NPM_CONFIG_MIN_RELEASE_AGE: 0.5

jobs:
  test:
    name: Test Engineering Metrics Action
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.14.0'
          cache: 'npm'
          cache-dependency-path: '.github/actions/eng-metrics/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: .github/actions/eng-metrics

      - name: Run linting
        run: npm run lint
        working-directory: .github/actions/eng-metrics

      - name: Run tests
        run: npm test
        working-directory: .github/actions/eng-metrics
        env:
          NODE_ENV: test
