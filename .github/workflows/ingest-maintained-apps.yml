name: Ingest maintained apps

on:
  push:
    branches:
      - main
    paths:
      - 'ee/maintained-apps/**'
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    permissions:
      contents: write         # Required to push new branch
      pull-requests: write    # Required to open PRs
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Get current date and time
        id: date
        run: echo "::set-output name=date::$(date +'%y%m%d%H%M')"

      - name: Checkout Fleet
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: fleetdm/fleet
          fetch-depth: 1
          ref: ${{ github.head_ref }}
          path: fleet
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          cache: false
          go-version-file: 'fleet/go.mod'

      - name: Ingest maintained apps
        env:
          NETWORK_TEST_GITHUB_TOKEN: ${{ secrets.FLEET_RELEASE_GITHUB_PAT }}
        run: |
          cd fleet
          go mod download
          go run cmd/maintained-apps/main.go

      - name: Install osslsigncode
        # Used by the verify step below to check Windows Authenticode
        # signatures at ingest, before the update PR opens.
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends osslsigncode

      - name: Verify changed installers
        # Downloads each changed installer, recomputes its SHA256 against the
        # manifest's claimed hash, and checks signing identities against the
        # pins in the input JSONs. Report-only (rollout Phase 0): failures are
        # surfaced in the PR body and job summary for the reviewer, and the
        # required verify-fma-installers PR check re-runs the same
        # verification on the PR itself. continue-on-error so a verifier bug
        # can't stall catalog updates.
        continue-on-error: true
        run: |
          # Reports are written OUTSIDE the fleet checkout so
          # create-pull-request doesn't commit them into the update PR.
          cd fleet
          go run ./cmd/maintained-apps/verify \
            -changed-from HEAD \
            -report "$GITHUB_WORKSPACE/verify-report.json" \
            -report-md "$GITHUB_WORKSPACE/verify-report.md"

      - name: Build PR body
        run: |
          {
            echo "Automated ingestion of latest Fleet-maintained app data."
            echo ""
            if [ -f verify-report.md ]; then
              cat verify-report.md
            else
              echo "> Installer verification did not produce a report for this run; see the workflow logs."
            fi
          } > pr-body.md

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: fma-verify-report
          path: verify-report.json
          if-no-files-found: ignore

      - name: Search for Existing PRs
        id: search_pr
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6.4.1
        with:
          script: |
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            return pullRequests.filter(pr => pr.title.includes('Update Fleet-maintained apps') && pr.user.login === 'fleet-release').map(pr => pr.number);

      - name: Log Info
        run: |
          echo "Will close existing PRs: ${{ steps.search_pr.outputs.result }}"

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e #v7.0.8
        with:
          token: ${{ secrets.FLEET_RELEASE_GITHUB_PAT }}
          base: main
          path: fleet
          branch: fma-${{ steps.date.outputs.date }}
          delete-branch: true
          title: "Update Fleet-maintained apps"
          commit-message: |
            Update Fleet-maintained apps.

            Generated automatically with cmd/maintained-apps.
          body-path: pr-body.md
          reviewers: allenhouchins

      - name: Close Existing PRs
        if: steps.search_pr.outputs.result != '[]'
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6.4.1
        with:
          script: |
            const prNumbers = JSON.parse('${{ steps.search_pr.outputs.result }}');
            const newPrNumber = '${{ steps.create-pr.outputs.pull-request-number }}';
            for (const prNumber of prNumbers) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `Closing in favor of #${newPrNumber}.`,
              });
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                state: 'closed',
              });
            }
