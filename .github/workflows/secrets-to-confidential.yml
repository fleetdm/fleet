name: Secret sync to confidential
on:
  workflow_dispatch:

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id}}
  cancel-in-progress: true

# The sync uses a dedicated PAT (SECRETS_GITHUB_PAT), so the default GITHUB_TOKEN needs no permissions.
permissions: {}

jobs:
  sync_secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: jpoehnelt/secrets-sync-action@7840777f242539d96b60477b66aa1c179e7644ea # v1.10.0
        name: Sync secrets to confidential
        with:
          SECRETS: |
            ^DIGICERT_.*
            ^APPLE_.*
          REPOSITORIES: |
            fleetdm/confidential
          DRY_RUN: true
          GITHUB_TOKEN: ${{ secrets.SECRETS_GITHUB_PAT }}
          CONCURRENCY: 10
