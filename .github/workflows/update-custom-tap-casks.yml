name: Update custom-tap casks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: read
  pull-requests: read

jobs:
  update:
    permissions:
      contents: write         # Required to push new branch
      pull-requests: write    # Required to open PRs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Get current date and time
        id: date
        run: echo "::set-output name=date::$(date +'%y%m%d%H%M')"

      - name: Checkout Fleet
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: fleetdm/fleet
          fetch-depth: 1
          ref: ${{ github.head_ref }}
          path: fleet

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          cache: false
          go-version-file: 'fleet/go.mod'

      - name: Update custom-tap casks
        env:
          GITHUB_TOKEN: ${{ secrets.FLEET_RELEASE_GITHUB_PAT }}
        run: |
          cd fleet
          go mod download
          go run cmd/maintained-apps-custom-tap-updater/main.go

      - name: Search for Existing PRs
        id: search_pr
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6.4.1
        with:
          script: |
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            return pullRequests.filter(pr => pr.title.includes('Update custom-tap casks') && pr.user.login === 'fleet-release').map(pr => pr.number);

      - name: Log Info
        run: |
          echo "Will close existing PRs: ${{ steps.search_pr.outputs.result }}"

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.FLEET_RELEASE_GITHUB_PAT }}
          base: main
          path: fleet
          branch: custom-tap-update-${{ steps.date.outputs.date }}
          delete-branch: true
          title: "Update custom-tap casks"
          commit-message: |
            Update custom-tap casks.

            Generated automatically by cmd/maintained-apps-custom-tap-updater.
          body: |
            Automated bump of cask versions under
            `ee/maintained-apps/inputs/homebrew/custom-tap/`.

            The downstream "Ingest maintained apps" workflow will regenerate
            `ee/maintained-apps/outputs/<app>/darwin.json` on its next
            scheduled run after this PR merges.
          reviewers: allenhouchins

      - name: Close Existing PRs
        if: steps.search_pr.outputs.result != '[]'
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6.4.1
        with:
          script: |
            const prNumbers = JSON.parse('${{ steps.search_pr.outputs.result }}');
            const newPrNumber = '${{ steps.create-pr.outputs.pull-request-number }}';
            for (const prNumber of prNumbers) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `Closing in favor of #${newPrNumber}.`,
              });
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                state: 'closed',
              });
            }
