name: Test dibble

on:
  push:
    branches:
      - main
    paths:
      - 'tools/dibble/**'
      # dibble pins the parent module via `replace github.com/fleetdm/fleet/v4 => ../..`, so a change to the
      # root module's dependency graph can leave tools/dibble/go.mod and go.sum out of sync. Trigger on the
      # root go.mod/go.sum too, so the same change that bumps a root dependency is forced to re-tidy dibble.
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test-dibble.yml'
  pull_request:
    paths:
      - 'tools/dibble/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test-dibble.yml'
  workflow_dispatch: # Manual

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    # fail-fast using bash -eo pipefail. See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'tools/dibble/go.mod'

      - name: Verify go.mod and go.sum are tidy
        working-directory: tools/dibble
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::tools/dibble/go.mod or go.sum is out of sync with the root module. Run 'cd tools/dibble && go mod tidy' and commit the result."
            exit 1
          fi

      - name: Build
        working-directory: tools/dibble
        run: go build ./...

      - name: Run tests
        working-directory: tools/dibble
        run: go test -race -count=1 ./...
