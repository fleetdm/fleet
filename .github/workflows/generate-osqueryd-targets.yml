name: Generate osqueryd targets for Fleetd

on:
  push:
    branches:
      - main
    paths:
      # The workflow can be triggered by modifying OSQUERY_VERSION env.
      - '.github/workflows/generate-osqueryd-targets.yml'
  pull_request:
    paths:
      # The workflow can be triggered by modifying OSQUERY_VERSION env.
      - '.github/workflows/generate-osqueryd-targets.yml'
  workflow_dispatch:

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id}}
  cancel-in-progress: true

defaults:
  run:
    # fail-fast using bash -eo pipefail. See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#exit-codes-and-error-action-preference
    shell: bash

env:
  OSQUERY_VERSION: 5.23.1
  # SHA256 checksums of the pinned osquery release assets downloaded below. osquery does
  # not publish signed checksums, so these pin the known-good bytes to detect tampering or
  # MITM of the GitHub release download before the binary is attested and shipped via TUF.
  # These MUST be updated whenever OSQUERY_VERSION changes.
  OSQUERY_SHA256_LINUX_AMD64: 1431a9a6394657eba3cdd3476a462a6fe9721fc3664a70f23efcf7e37816787a
  OSQUERY_SHA256_LINUX_ARM64: 062df9b6432ca1b374e80b24b54f027e224f1300d8bf6338182ec40f41b7975d
  OSQUERY_SHA256_WINDOWS_X64_MSI: bb3adc9f32f257147855404d24bceebcd8baf6e65f4d4ca43e186f4a85fa6ed3
  OSQUERY_SHA256_WINDOWS_ARM64_ZIP: 0913d05cc3fc92dd9253c945caacde10a776408f267cc1cc853a05de24dba900

# Least-privilege default; each build job grants id-token/attestations at the job level.
permissions:
  contents: read

jobs:
  generate-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write # required for attest-build-provenance
      attestations: write # required for attest-build-provenance
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          persist-credentials: false

      - name: Generate osqueryd.app.tar.gz
        run: |
          make osqueryd-app-tar-gz out-path=. version=$OSQUERY_VERSION

      - name: Extract archive for attestation
        run: |
          mkdir -p extracted
          tar -xzf osqueryd.app.tar.gz -C extracted

      - name: Attest binary
        continue-on-error: true
        uses: actions/attest-build-provenance@619dbb2e03e0189af0c55118e7d3c5e129e99726 # v2.0.0
        with:
          subject-path: "extracted/osquery.app/Contents/MacOS/*"

      - name: Repackage archive
        run: |
          cd extracted
          tar -czf ../osqueryd.app.tar.gz ./*

      - name: Upload osqueryd.app.tar.gz
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: osqueryd.app.tar.gz
          path: osqueryd.app.tar.gz

  generate-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for attest-build-provenance
      attestations: write # required for attest-build-provenance
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          persist-credentials: false

      - name: Download and extract osqueryd for linux
        run: |
          curl -L https://github.com/osquery/osquery/releases/download/${{ env.OSQUERY_VERSION }}/osquery_${{ env.OSQUERY_VERSION }}-1.linux_amd64.deb --output osquery.deb
          echo "${OSQUERY_SHA256_LINUX_AMD64}  osquery.deb" | sha256sum --check --strict -
          ar x osquery.deb
          tar xf data.tar.gz
          chmod +x ./opt/osquery/bin/osqueryd
          ./opt/osquery/bin/osqueryd --version

      - name: Attest binary
        continue-on-error: true
        uses: actions/attest-build-provenance@619dbb2e03e0189af0c55118e7d3c5e129e99726 # v2.0.0
        with:
          subject-path: "opt/osquery/bin/osqueryd"

      - name: Upload osqueryd for linux
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: osqueryd
          path: opt/osquery/bin/osqueryd

  generate-linux-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for attest-build-provenance
      attestations: write # required for attest-build-provenance
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          persist-credentials: false

      - name: Install file
        run: |
          sudo apt-get install -y file

      - name: Download and extract osqueryd for linux-arm64
        run: |
          curl -L https://github.com/osquery/osquery/releases/download/${{ env.OSQUERY_VERSION }}/osquery_${{ env.OSQUERY_VERSION }}-1.linux_arm64.deb --output osquery.deb
          echo "${OSQUERY_SHA256_LINUX_ARM64}  osquery.deb" | sha256sum --check --strict -
          ar x osquery.deb
          tar xf data.tar.gz
          chmod +x ./opt/osquery/bin/osqueryd
          file ./opt/osquery/bin/osqueryd | grep aarch64

      - name: Attest binary
        continue-on-error: true
        uses: actions/attest-build-provenance@619dbb2e03e0189af0c55118e7d3c5e129e99726 # v2.0.0
        with:
          subject-path: "opt/osquery/bin/osqueryd"

      - name: Upload osqueryd for linux-arm64
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: osqueryd-arm64
          path: opt/osquery/bin/osqueryd

  generate-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write # required for attest-build-provenance
      attestations: write # required for attest-build-provenance
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          persist-credentials: false

      - name: Download osquery msi for Windows
        run: |
          curl -L https://github.com/osquery/osquery/releases/download/${{ env.OSQUERY_VERSION }}/osquery-${{ env.OSQUERY_VERSION }}.msi --output osquery-${{ env.OSQUERY_VERSION }}.msi
          echo "${OSQUERY_SHA256_WINDOWS_X64_MSI}  osquery-${{ env.OSQUERY_VERSION }}.msi" | sha256sum --check --strict -

      - name: Extract osqueryd.exe for Windows
        shell: cmd
        run: |
          msiexec /a osquery-${{ env.OSQUERY_VERSION }}.msi /qb TARGETDIR=C:\temp
          C:\temp\osquery\osqueryd\osqueryd.exe --version

      - name: Attest binary
        continue-on-error: true
        uses: actions/attest-build-provenance@619dbb2e03e0189af0c55118e7d3c5e129e99726 # v2.0.0
        with:
          subject-path: C:\temp\osquery\osqueryd\osqueryd.exe

      - name: Upload osqueryd for Windows
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: osqueryd.exe
          path: C:\temp\osquery\osqueryd\osqueryd.exe

  generate-windows-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for attest-build-provenance
      attestations: write # required for attest-build-provenance
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
        with:
          persist-credentials: false

      - name: Download osquery msi for Windows
        run: |
          curl -L https://github.com/osquery/osquery/releases/download/${{ env.OSQUERY_VERSION }}/osquery-${{ env.OSQUERY_VERSION }}.windows_arm64.zip --output osquery-${{ env.OSQUERY_VERSION }}.windows_arm64.zip
          echo "${OSQUERY_SHA256_WINDOWS_ARM64_ZIP}  osquery-${{ env.OSQUERY_VERSION }}.windows_arm64.zip" | sha256sum --check --strict -

      - name: Install file
        run: |
          sudo apt-get install -y unzip file

      - name: Extract osqueryd.exe for Windows
        run: |
          unzip osquery-${{ env.OSQUERY_VERSION }}.windows_arm64.zip
          cp osquery-${{ env.OSQUERY_VERSION }}.windows_arm64/Program\ Files/osquery/osqueryd/osqueryd.exe .
          file ./osqueryd.exe | grep "PE32+ executable (console) Aarch64"

      - name: Attest binary
        continue-on-error: true
        uses: actions/attest-build-provenance@619dbb2e03e0189af0c55118e7d3c5e129e99726 # v2.0.0
        with:
          subject-path: osqueryd.exe

      - name: Upload osqueryd for Windows
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: osqueryd-arm64.exe
          path: osqueryd.exe
