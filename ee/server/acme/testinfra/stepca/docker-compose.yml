---
# Local step-ca instance for ACME proxy testing.
# Usage:
#   docker compose -f server/mdm/acmeproxy/internal/testinfra/stepca/docker-compose.yml up -d
#
# The CA is initialized on first run with an ACME provisioner.
# Directory URL: https://localhost:${STEP_CA_PORT:-9443}/acme/acme/directory
services:
  step-ca-init:
    image: smallstep/step-ca:latest
    volumes:
      - step-ca-data:/home/step
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Only initialize if not already done
        if [ ! -f /home/step/config/ca.json ]; then
          step ca init \
            --name="Fleet ACME Test CA" \
            --provisioner="admin" \
            --dns="localhost" \
            --address=":9443" \
            --password-file=/dev/stdin <<< "testpassword"

          # Add an ACME provisioner
          step ca provisioner add acme --type ACME

          echo "CA initialized successfully"
        else
          echo "CA already initialized, skipping"
        fi

  step-ca:
    image: smallstep/step-ca:latest
    depends_on:
      step-ca-init:
        condition: service_completed_successfully
    volumes:
      - step-ca-data:/home/step
    ports:
      - "127.0.0.1:${STEP_CA_PORT:-9443}:9443"
    environment:
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: admin
      DOCKER_STEPCA_INIT_PASSWORD: testpassword

volumes:
  step-ca-data:
