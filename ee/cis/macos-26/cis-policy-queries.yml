        SELECT 1 FROM managed_policies WHERE
          domain = 'com.apple.SubmitDiagInfo' AND
          name = 'AutoSubmit' AND
          (value = 0 OR value = 'false') AND
          username = ''
      )
      AND NOT EXISTS (
        SELECT 1 FROM managed_policies WHERE
          domain = 'com.apple.SubmitDiagInfo' AND
          name = 'AutoSubmit' AND
          (value != 0 AND value != 'false')
      );
  purpose: Informational
