id: windows-security-baseline
name: "Windows Security Baseline"
version: "1.0.0"
platform: windows
description: "Windows security settings derived from CIS L1 and Microsoft Intune security baselines. Covers firewall, Defender, credential guard, ASR rules, audit policies, network security, account lockout, user rights, and browser security."
categories:
  - name: "Windows Firewall"
    profiles:
      - profiles/firewall.xml
    policies:
      - policies/verify-firewall.yaml
    scripts: []

  - name: "Windows Defender"
    profiles:
      - profiles/defender.xml
    policies:
      - policies/verify-defender.yaml
    scripts: []

  - name: "Credential Guard"
    profiles:
      - profiles/credential-guard.xml
    policies:
      - policies/verify-credential-guard.yaml
    scripts: []

  - name: "Attack Surface Reduction"
    profiles:
      - profiles/asr-rules.xml
    policies:
      - policies/verify-asr-rules.yaml
    scripts: []

  - name: "Audit Policies"
    profiles:
      - profiles/audit-policies.xml
    policies:
      - policies/verify-audit-policies.yaml
    scripts: []

  - name: "Network Security"
    profiles:
      - profiles/network-security.xml
    policies:
      - policies/verify-network-security.yaml
    scripts: []

  - name: "Account Lockout"
    profiles:
      - profiles/account-lockout.xml
    policies:
      - policies/verify-account-lockout.yaml
    scripts: []

  - name: "User Rights"
    profiles:
      - profiles/user-rights.xml
    policies:
      - policies/verify-user-rights.yaml
    scripts: []

  - name: "Browser Security"
    profiles:
      - profiles/browser-security.xml
    policies:
      - policies/verify-browser-security.yaml
    scripts: []

  - name: "Service Configuration"
    profiles: []
    policies:
      - policies/verify-services.yaml
    scripts:
      - scripts/configure-services.ps1
