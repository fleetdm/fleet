- name: "[NVIDIA Baseline] Verify Virtualization Based Security enabled"
  query: "SELECT 1 FROM registry WHERE path = 'HKEY_LOCAL_MACHINE\\SOFTWARE\\Policies\\Microsoft\\Windows\\DeviceGuard\\EnableVirtualizationBasedSecurity' AND data = '1';"
  description: "Verifies Virtualization Based Security (VBS) is enabled for Credential Guard."
  resolution: "Re-apply the Credential Guard SyncML profile. Ensure hardware supports VBS (UEFI Secure Boot, TPM 2.0)."
  platform: windows
  critical: true

- name: "[NVIDIA Baseline] Verify Credential Guard (LSASS protection)"
  query: "SELECT 1 FROM registry WHERE path = 'HKEY_LOCAL_MACHINE\\SOFTWARE\\Policies\\Microsoft\\Windows\\DeviceGuard\\LsaCfgFlags' AND data = '1';"
  description: "Verifies Credential Guard is configured to protect LSASS."
  resolution: "Re-apply the Credential Guard SyncML profile."
  platform: windows
  critical: true
