# Glossary of device management, MDM, osquery, GitOps, and IT security terms.
# Renders at https://fleetdm.com/device-management-glossary.
#
# Schema per entry (all keys required unless noted):
#   name:           Display heading for the term (e.g. "Apple Business Manager (ABM)").
#   slug:           URL-safe identifier; becomes the anchor (#term-<slug>) on the page.
#   categories:     List drawn from: MDM, Security, osquery, GitOps, Apple, Windows, Linux.
#   searchKeywords: Space-separated synonyms and adjacent terms for search hits. (Optional.)
#   definition:     Plain-language definition, neutral, vendor-agnostic.
#   fleetNote:      One- or two-sentence note on how Fleet handles this term.
#   links:          Optional list of { label, url } for related Fleet pages.

- name: ACME (Automated Certificate Management Environment)
  slug: acme
  categories:
    - Security
    - Linux
  searchKeywords: acme automated certificate management environment lets encrypt cert renewal
  definition: A protocol for automating the issuance and renewal of TLS
    certificates, originally created by Let's Encrypt. ACME is increasingly
    important as the CA/Browser Forum drives public TLS certificate lifetimes
    down toward 47 days by 2029, making manual renewal impractical.
  fleetNote: Fleet helps Linux, macOS, and Windows admins keep up with shrinking
    certificate lifetimes by surfacing certificate inventory and expiration
    across hosts and supporting policy-triggered scripts to rotate certs before
    they break Wi-Fi, VPN, or HTTPS.
  links:
    - label: Linux device management
      url: /linux-management
- name: Activation Lock
  slug: activation-lock
  categories:
    - Apple
    - Security
  searchKeywords: activation lock apple find my iphone ipad mac icloud bypass mdm
  definition: An Apple security feature that ties a device to an iCloud account
    through Find My. Once Activation Lock is set, the device cannot be
    re-activated, wiped, or re-enrolled without the iCloud credentials, which
    protects lost or stolen devices but can block IT recovery on supervised
    company hardware.
  fleetNote: Fleet reports Activation Lock status across managed Apple devices and
    can clear Activation Lock on supervised devices through MDM, so IT teams can
    recover hardware from departing employees without an iCloud round trip.
  links: []
- name: Active Directory (AD)
  slug: active-directory
  categories:
    - Windows
    - Security
  searchKeywords: active directory ad domain controller ldap kerberos group policy
    on premise microsoft
  definition: Microsoft's on-premises directory service, the long-standing
    backbone of enterprise Windows identity. AD provides user and computer
    accounts, group policy distribution, Kerberos authentication, and LDAP
    lookups. Many organizations now run AD alongside or behind Microsoft Entra
    ID.
  fleetNote: Fleet integrates with directory services through SSO, SCIM, and SAML,
    so device assignment, scoping, and admin access tie back to corporate
    identity whether it lives in Active Directory, Entra ID, or a third-party
    IdP.
  links: []
- name: ADE (Automated Device Enrollment)
  slug: automated-device-enrollment
  categories:
    - Apple
    - MDM
  searchKeywords: ade automated device enrollment apple dep prestage zero touch supervised
  definition: Apple's mechanism for automatically enrolling devices in MDM the
    first time they activate, formerly known as DEP (Device Enrollment Program).
    ADE devices receive the MDM profile through Apple Business Manager or Apple
    School Manager and typically land in supervised mode with stronger MDM
    controls.
  fleetNote: Fleet uses ADE through Apple Business Manager to deliver zero-touch
    enrollment for Mac, iPhone, and iPad, with a customizable Setup Experience
    for each fleet.
  links:
    - label: Apple MDM setup
      url: /guides/apple-mdm-setup
- name: Agent (fleetd)
  slug: fleetd-agent
  categories:
    - MDM
  searchKeywords: agent fleetd orbit osquery installer
  definition: A lightweight software component installed on managed devices that
    communicates with the device management server. Fleet's agent is called
    fleetd. It bundles osquery, Fleet Desktop, and the orbit auto-updater into a
    single installer. The agent collects device data, receives configuration
    updates, and executes scripts.
  fleetNote: fleetd runs on macOS, Windows, and Linux. It is code-signed,
    auto-updating, and runs with minimal privileges.
  links: []
- name: Ansible
  slug: ansible
  categories:
    - Linux
    - GitOps
  searchKeywords: ansible configuration management playbook ssh agentless red hat
  definition: An open-source configuration management and automation tool from Red
    Hat. Ansible uses YAML playbooks to describe desired state and reaches
    managed nodes over SSH without installing an agent. It is widely used for
    Linux server provisioning and ongoing config drift correction.
  fleetNote: "Fleet complements Ansible: Ansible handles server-side automation;
    Fleet manages end-user devices and gives you live posture, vulnerability
    detection, and policy-driven remediation across macOS, Windows, and Linux
    endpoints."
  links:
    - label: Linux device management
      url: /linux-management
- name: APNs (Apple Push Notification service)
  slug: apns
  categories:
    - Apple
    - MDM
  searchKeywords: apns apple push notification service certificate mdm
  definition: A cloud service that Apple uses to send notifications to managed
    devices. MDM servers rely on APNs to wake devices and trigger configuration
    changes, command runs, and check-ins. Connecting an MDM to APNs requires an
    Apple-issued push certificate that is renewed annually.
  fleetNote: Fleet uses APNs to talk to enrolled Apple devices. Generate and renew
    your APNs certificate from Fleet, and Fleet will manage delivery to every
    Mac, iPhone, and iPad.
  links:
    - label: Apple MDM setup
      url: /guides/apple-mdm-setup
- name: AppImage
  slug: appimage
  categories:
    - Linux
  searchKeywords: appimage linux portable app single file no install
  definition: A Linux application format that packages an entire app and its
    dependencies into a single executable file. AppImage runs across many
    distributions without root or installation; users download the file, mark it
    executable, and run.
  fleetNote: Fleet reports AppImage usage in Linux software inventory and can
    distribute AppImage files as custom software, scoped to the right Linux
    fleet or label.
  links: []
- name: Apple Business Manager (ABM)
  slug: apple-business-manager
  categories:
    - Apple
    - MDM
  searchKeywords: abm apple business manager ade automated device enrollment
  definition: A web portal from Apple that lets IT admins manage Apple device
    enrollment, app distribution through Apps and Books, and Managed Apple IDs.
    ABM connects to an MDM server to enable zero-touch deployment, so devices
    automatically enroll in management when powered on for the first time.
  fleetNote: Fleet integrates with ABM for automated device enrollment. Connect
    your ABM account in Fleet to enable zero-touch setup for Mac, iPhone, and
    iPad.
  links:
    - label: Apple MDM setup guide
      url: /guides/apple-mdm-setup
    - label: Apple MDM
      url: /lp/apple-mdm
- name: Apple Configurator
  slug: apple-configurator
  categories:
    - Apple
    - MDM
  searchKeywords: apple configurator iphone ipad usb enrollment prepare supervised non ade
  definition: A free Apple tool for preparing Mac, iPhone, and iPad devices over
    USB. Admins commonly use Apple Configurator to add devices to Apple Business
    Manager when those devices were not originally purchased through an
    ADE-eligible channel, and to perform recovery or supervision tasks.
  fleetNote: Devices added to Apple Business Manager through Apple Configurator
    can then enroll in Fleet through ADE, picking up the same zero-touch
    experience as devices purchased directly through ABM.
  links: []
- name: Apple silicon
  slug: apple-silicon
  categories:
    - Apple
  searchKeywords: apple silicon m1 m2 m3 m4 arm64 mac mini macbook universal binary rosetta
  definition: Apple's family of ARM-based system-on-a-chip processors (M1, M2, M3,
    M4 and successors) used in modern Macs, iPads, and other devices. Apple
    silicon changes parts of the Mac admin workflow, from boot security and
    recovery to software architecture (arm64 vs. x86_64) and tooling like
    Rosetta.
  fleetNote: Fleet reports CPU architecture across managed Macs, so software
    policies and reports can scope to Apple silicon or Intel devices and target
    the right binaries.
  links: []
- name: AppLocker
  slug: applocker
  categories:
    - Windows
    - Security
  searchKeywords: applocker windows defender application control wdac allowlist
    whitelisting executable powershell
  definition: A Windows feature that lets admins allow or deny execution of
    specific apps, scripts, and installers by publisher, path, or hash.
    AppLocker is often paired with Defender Application Control (WDAC) for
    stronger app allow-listing.
  fleetNote: Fleet reports AppLocker and Windows Defender Application Control
    policy state across Windows hosts, helping security teams confirm that
    allow-list policies are deployed and enforcing as expected.
  links: []
- name: APT (Advanced Package Tool)
  slug: apt
  categories:
    - Linux
  searchKeywords: apt advanced package tool dpkg debian ubuntu apt-get install update upgrade
  definition: The package management system for Debian-based Linux distributions,
    including Ubuntu. APT handles installation, upgrade, and removal of .deb
    packages, resolves dependencies, and pulls from configured software
    repositories.
  fleetNote: Fleet installs, updates, and patches software on Debian-based Linux
    fleets through APT, including custom .deb packages and Fleet-maintained
    applications.
  links:
    - label: Linux device management
      url: /linux-management
- name: Auto-patching
  slug: auto-patching
  categories:
    - Security
    - MDM
  searchKeywords: auto patching autopatch windows autopatch automated patch
    management time to exploit
  definition: The practice of detecting outdated or vulnerable software on devices
    and installing updates automatically, without manual approval for every
    device. Auto-patching keeps fleets close to current versions and shrinks the
    window between a CVE going public and devices being protected. Microsoft's
    Windows Autopatch service is a specific managed offering in this category.
  fleetNote: Fleet auto-patches macOS, Windows, and Linux through a combination of
    Fleet-maintained applications, policies that detect outdated software, and
    policy-triggered installs. The Autonomous Endpoint Management approach lets
    teams patch at exploit speed with humans in the loop.
  links:
    - label: Patch faster
      url: /lp/patch-faster
    - label: Autonomous endpoint management
      url: /lp/autonomous-endpoint-management
- name: Autonomous Endpoint Management (AEM)
  slug: autonomous-endpoint-management
  categories:
    - MDM
    - Security
  searchKeywords: autonomous endpoint management aem self healing auto remediation
    patch at exploit speed
  definition: A device-management approach where policies, profiles, and software
    updates apply themselves on a continuous loop. Policies detect drift or
    vulnerabilities, Fleet runs remediation, and humans review changes in pull
    requests rather than clicking through every device. The goal is to patch at
    exploit speed (currently around 1.3 days average time-to-exploit for new
    CVEs) without overwhelming IT and security teams.
  fleetNote: Fleet was built for autonomous endpoint management. Policy-triggered
    software installs and scripts, automated patching with Fleet-maintained
    applications, and GitOps-driven config combine into a self-healing baseline
    across every operating system.
  links:
    - label: Autonomous endpoint management
      url: /lp/autonomous-endpoint-management
- name: AutoPkg
  slug: autopkg
  categories:
    - Apple
    - MDM
  searchKeywords: autopkg packaging automation munki recipes
  definition: An open-source automation framework that Mac admins use to download,
    package, and prepare third-party software for deployment. AutoPkg recipes
    describe how to fetch the latest version of an app and turn it into a
    deployable .pkg.
  fleetNote: "Fleet works alongside AutoPkg: build packages with your existing
    AutoPkg recipes, then upload them to Fleet as custom software for automated
    install and patch on managed devices."
  links: []
- name: Autopilot (Windows)
  slug: windows-autopilot
  categories:
    - Windows
    - MDM
  searchKeywords: autopilot windows zero touch provisioning entra
  definition: A Microsoft technology for zero-touch provisioning of Windows
    devices. When a device is powered on for the first time and connected to the
    internet, Autopilot automatically configures it according to organizational
    policy and enrolls it in MDM.
  fleetNote: Fleet supports Windows Autopilot for zero-touch enrollment via
    Microsoft Entra ID integration.
  links: []
- name: BitLocker
  slug: bitlocker
  categories:
    - Windows
    - Security
  searchKeywords: bitlocker windows disk encryption full disk encryption fde
  definition: Microsoft's full-disk encryption technology for Windows. BitLocker
    encrypts the system drive and any selected data drives, protecting data if a
    device is lost or stolen. Enterprise deployments typically pair BitLocker
    with TPM and recovery key escrow.
  fleetNote: Fleet enforces BitLocker encryption on managed Windows devices,
    reports per-host encryption status in real time, and escrows recovery keys
    for authorized admins.
  links: []
- name: Bootstrap Token
  slug: bootstrap-token
  categories:
    - Apple
    - MDM
  searchKeywords: bootstrap token macos apple silicon escrow secure token volume
    ownership filevault
  definition: A macOS escrow mechanism that lets MDM-managed devices, especially
    Apple silicon Macs, perform secure operations on behalf of an admin without
    prompting an end user. Bootstrap Token is required for many MDM commands,
    including FileVault enable and OS update installs, to work without local
    user interaction.
  fleetNote: Fleet escrows the Bootstrap Token automatically during ADE
    enrollment, so software install, OS updates, and FileVault enforcement on
    managed Macs work end-to-end without IT touching each device.
  links: []
- name: BYOD (Bring Your Own Device)
  slug: byod
  categories:
    - MDM
  searchKeywords: byod bring your own device personal work profile user enrollment
  definition: A policy where employees use personal devices for work. BYOD
    enrollment typically separates personal and work data through work profiles
    (Android) or account-driven user enrollment (iOS, iPadOS), giving the
    organization control over work data without managing the entire device.
  fleetNote: Fleet supports BYOD enrollment for iOS and iPadOS through
    account-driven user enrollment, and for Android through work profiles.
  links: []
- name: CentOS
  slug: centos
  categories:
    - Linux
  searchKeywords: centos rocky linux almalinux rhel rebuild rpm dnf yum
  definition: A former community rebuild of Red Hat Enterprise Linux, popular for
    years as a free RHEL-compatible distribution. After CentOS shifted to CentOS
    Stream in 2020, Rocky Linux and AlmaLinux emerged as community rebuilds of
    RHEL with the same binary compatibility.
  fleetNote: Fleet manages CentOS, CentOS Stream, Rocky Linux, AlmaLinux, and
    other RHEL-derived distributions as first-class platforms, including
    software install and patching, vulnerability detection, and policies.
  links:
    - label: Linux device management
      url: /linux-management
- name: ChromeOS
  slug: chromeos
  categories:
    - MDM
  searchKeywords: chromeos chromebook google management
  definition: Google's operating system for Chromebooks, used widely in education
    and increasingly in the enterprise. ChromeOS device management is typically
    handled through the Google Admin console, with policies tied to Google
    Workspace accounts.
  fleetNote: Fleet provides visibility into ChromeOS devices alongside macOS,
    Windows, Linux, iOS, iPadOS, and Android, so IT teams can manage a mixed
    fleet from one console.
  links: []
- name: CIS Benchmarks
  slug: cis-benchmarks
  categories:
    - Security
  searchKeywords: cis benchmarks center for internet security hardening compliance
  definition: A set of best-practice security configurations published by the
    Center for Internet Security. CIS Benchmarks exist for macOS, Windows,
    Linux, and many other platforms. They provide specific, actionable
    recommendations for hardening operating systems and applications.
  fleetNote: Fleet ships with policy packs that map directly to CIS Benchmark
    recommendations. Policies evaluate device compliance automatically and
    continuously.
  links:
    - label: CIS Benchmarks guide
      url: /guides/cis-benchmarks
- name: Cloud-init
  slug: cloud-init
  categories:
    - Linux
  searchKeywords: cloud init user data bootstrap provisioning ec2 aws gcp azure
    first boot linux
  definition: A widely used framework for bootstrapping Linux instances on first
    boot, especially in cloud environments. Cloud-init reads user data from the
    cloud provider and applies it to configure hostnames, users, SSH keys,
    packages, and startup scripts before the system reaches steady state.
  fleetNote: Use cloud-init to install the Fleet agent (fleetd) automatically when
    new Linux instances launch. Devices appear in Fleet from the moment they
    boot, with no manual enrollment step.
  links:
    - label: Linux device management
      url: /linux-management
- name: Co-management (Intune)
  slug: co-management
  categories:
    - Windows
    - MDM
  searchKeywords: co management intune sccm configuration manager dual management workload
  definition: A Microsoft setup where a Windows device is managed jointly by
    Microsoft Intune (modern MDM) and Microsoft Configuration Manager (legacy
    SCCM). Admins choose which workloads (such as compliance policies or Windows
    Update) move to Intune and which stay in Configuration Manager.
  fleetNote: Fleet replaces both sides of co-management for Windows with a single
    modern, GitOps-driven platform that also covers macOS, Linux, iOS, iPadOS,
    Android, and ChromeOS.
  links: []
- name: Compliance
  slug: compliance
  categories:
    - Security
  searchKeywords: compliance audit soc2 hipaa pci iso 27001 nist
  definition: The ongoing process of meeting regulatory, contractual, or internal
    security requirements. Common device-management frameworks include SOC 2,
    ISO 27001, HIPAA, PCI DSS, and NIST CSF. Each prescribes controls such as
    encryption, patching, access control, and audit logging.
  fleetNote: Fleet provides continuous compliance evaluation with policies that
    map to common frameworks, real-time evidence collection, and exports that
    satisfy auditors.
  links: []
- name: Conditional Access
  slug: conditional-access
  categories:
    - Security
  searchKeywords: conditional access ca microsoft entra azure ad policy access
    control device trust
  definition: A Microsoft Entra ID policy mechanism that grants or blocks access
    to applications based on signals such as user identity, device compliance,
    location, and risk. Conditional Access is the front line of zero-trust
    access for many organizations that use Microsoft 365.
  fleetNote: Fleet provides the device compliance signal that Conditional Access
    depends on. Policies in Fleet evaluate posture continuously and feed device
    trust state to Entra ID and partner platforms.
  links: []
- name: Configuration profile
  slug: configuration-profile
  categories:
    - Apple
    - MDM
  searchKeywords: configuration profile mobileconfig csp settings policy
  definition: A file that defines device settings, restrictions, and policies.
    Apple uses .mobileconfig XML profiles; Windows uses CSP-based settings.
    Configuration profiles are deployed through MDM to enforce settings such as
    password rules, encryption, Wi-Fi configuration, and app restrictions.
  fleetNote: Fleet deploys configuration profiles to macOS, iOS, iPadOS, and
    Windows. Profiles can be managed in the UI or as code through GitOps.
  links: []
- name: Configuration Service Provider (CSP)
  slug: configuration-service-provider
  categories:
    - Windows
    - MDM
  searchKeywords: csp configuration service provider windows mdm policy intune syncml omadm
  definition: The Windows interface that MDM tools use to read and write device
    settings, the modern equivalent of Group Policy. Each CSP exposes a tree of
    settings (BitLocker, Firewall, Defender, Update, and many others) that an
    MDM server can configure on managed Windows devices.
  fleetNote: Fleet deploys CSP-based Windows configuration through MDM, manageable
    in the UI or as YAML through GitOps for full version-controlled Windows
    policy.
  links: []
- name: CVE (Common Vulnerabilities and Exposures)
  slug: cve
  categories:
    - Security
  searchKeywords: cve common vulnerabilities exposures cvss kev epss nvd
  definition: A standardized identifier for a known security vulnerability, for
    example CVE-2024-12345. CVEs are published in the National Vulnerability
    Database (NVD) and scored using the CVSS system. Security teams use CVEs to
    track and prioritize patching.
  fleetNote: Fleet detects CVEs in installed software across all platforms.
    Vulnerabilities are enriched with CISA KEV and EPSS data to help prioritize
    remediation.
  links: []
- name: Debian
  slug: debian
  categories:
    - Linux
  searchKeywords: debian linux distribution stable apt deb package server
  definition: A long-running, community-driven Linux distribution and the base for
    Ubuntu and many derivatives. Debian is known for stability and conservative
    release cycles, which makes it popular for servers and developer
    workstations.
  fleetNote: Fleet supports Debian and Debian-based distributions as a first-class
    platform, including software install and patching through APT, configuration
    profiles, scripts, and policies.
  links:
    - label: Linux device management
      url: /linux-management
- name: Declarative Device Management (DDM)
  slug: declarative-device-management
  categories:
    - Apple
    - MDM
  searchKeywords: ddm declarative device management apple wwdc state
  definition: Apple's next-generation MDM protocol, introduced at WWDC 2021. DDM
    moves from a command-response model to a state-based approach. You declare
    the desired state and the device autonomously achieves and maintains it.
    This reduces server communication overhead and improves reliability.
  fleetNote: Fleet supports DDM for Apple devices, including declarative
    configurations and status reporting.
  links: []
- name: Defender (Microsoft Defender)
  slug: microsoft-defender
  categories:
    - Windows
    - Security
  searchKeywords: defender microsoft defender for endpoint mde windows antivirus
    edr smartscreen
  definition: Microsoft's built-in antivirus and endpoint security stack on
    Windows, with an enterprise tier called Microsoft Defender for Endpoint
    (MDE) that provides EDR, threat and vulnerability management, attack surface
    reduction, and SmartScreen.
  fleetNote: Fleet reports Microsoft Defender status, signature versions, and key
    configuration across Windows hosts, and complements MDE with cross-platform
    osquery telemetry and policy-driven remediation.
  links: []
- name: DNF (Dandified YUM)
  slug: dnf
  categories:
    - Linux
  searchKeywords: dnf dandified yum red hat fedora rpm package manager rhel rocky almalinux
  definition: The default package manager for modern Red Hat-based Linux
    distributions, including Fedora, RHEL 8+, Rocky Linux, and AlmaLinux. DNF is
    the successor to YUM and handles install, update, and removal of .rpm
    packages with cleaner dependency resolution and a more modern plugin system.
  fleetNote: Fleet installs, updates, and patches software on RHEL-derived Linux
    hosts through DNF/YUM, including custom .rpm packages and Fleet-maintained
    applications.
  links:
    - label: Linux device management
      url: /linux-management
- name: eBPF (Extended Berkeley Packet Filter)
  slug: ebpf
  categories:
    - Linux
    - osquery
  searchKeywords: ebpf extended berkeley packet filter linux kernel observability
    bpf tracing process events
  definition: A Linux kernel technology that lets safe, sandboxed programs run
    inside the kernel to observe and instrument system events with minimal
    overhead. eBPF underpins modern Linux observability, networking, and
    security tooling, and powers next-generation osquery tables such as
    bpf_process_events and bpf_socket_events.
  fleetNote: Fleet uses osquery, which is moving toward eBPF for richer process,
    network, and security event collection on Linux. The result is deeper,
    real-time Linux visibility without the overhead of the older Audit
    framework.
  links:
    - label: Linux device management
      url: /linux-management
- name: EDR (Endpoint Detection and Response)
  slug: edr
  categories:
    - Security
  searchKeywords: edr endpoint detection response xdr siem
  definition: A category of security tools that continuously collect endpoint
    telemetry, detect suspicious activity, and support investigation and
    response. EDR complements antivirus by focusing on behavior and
    post-compromise visibility rather than file signatures.
  fleetNote: Fleet provides the open, structured endpoint data that EDR teams
    need. Pipe Fleet telemetry into Splunk, Snowflake, Elastic, or any SIEM and
    EDR workflow.
  links: []
- name: Endpoint
  slug: endpoint
  categories:
    - MDM
    - Security
  searchKeywords: endpoint host device workstation laptop
  definition: A computing device that connects to a network, such as a laptop,
    desktop, server, smartphone, or tablet. In IT and security, "endpoint
    management" and "endpoint security" refer to the tools and practices for
    configuring and protecting these devices at scale.
  fleetNote: Fleet provides endpoint management and visibility for macOS, Windows,
    Linux, iOS, iPadOS, Android, and ChromeOS endpoints from a single console.
  links:
    - label: Device management
      url: /device-management
- name: Enrollment
  slug: enrollment
  categories:
    - MDM
  searchKeywords: enrollment mdm enroll provisioning enrollment profile
  definition: The process by which a device becomes managed by an MDM server.
    Enrollment can be user-driven, automated through Apple Business Manager or
    Windows Autopilot, or account-driven for BYOD. Once enrolled, the device
    accepts configuration profiles and commands from the management server.
  fleetNote: Fleet supports automated, user-driven, and account-driven enrollment
    across macOS, iOS, iPadOS, Windows, and Android, with self-service
    enrollment links for end users.
  links: []
- name: Extension Attributes (Jamf)
  slug: extension-attributes
  categories:
    - Apple
    - MDM
  searchKeywords: extension attributes ea jamf custom inventory shell script
  definition: A Jamf Pro concept for collecting custom device data with shell
    scripts that run on the same cadence as inventory updates, often once a day.
    EAs are useful but slow, fragile, and limited to whatever the script can
    compute and echo back.
  fleetNote: In Fleet, Extension Attribute scripts are replaced by osquery-powered
    reports that run in seconds across thousands of hosts and return live data.
    The Fleet guide "Death to Extension Attributes" walks through the
    translation.
  links: []
- name: Fedora
  slug: fedora
  categories:
    - Linux
  searchKeywords: fedora linux red hat upstream workstation server cloud rpm dnf
  definition: A community-driven Linux distribution sponsored by Red Hat. Fedora
    serves as the upstream for Red Hat Enterprise Linux and tends to ship newer
    kernel and package versions, which makes it popular with developers and
    Linux enthusiasts.
  fleetNote: Fleet manages Fedora alongside other RPM-based distributions,
    including software install and patching, vulnerability detection, and
    policy-driven remediation.
  links:
    - label: Linux device management
      url: /linux-management
- name: File Integrity Monitoring (FIM)
  slug: file-integrity-monitoring
  categories:
    - Security
    - osquery
  searchKeywords: fim file integrity monitoring pci dss hipaa
  definition: A security control that detects changes to critical files on a
    system. FIM monitors specified directories and files for modifications,
    deletions, and new file creation. It is required by many compliance
    frameworks including PCI DSS and HIPAA.
  fleetNote: Fleet provides FIM through osquery's file events table. Monitor any
    directory across your fleet and alert when unauthorized changes are
    detected.
  links: []
- name: FileVault
  slug: filevault
  categories:
    - Apple
    - Security
  searchKeywords: filevault full disk encryption macos
  definition: Apple's full-disk encryption technology for macOS. When enabled,
    FileVault encrypts the entire startup disk using XTS-AES-128 encryption with
    a 256-bit key, protecting data if a device is lost or stolen.
  fleetNote: Fleet enforces FileVault encryption through MDM and reports per-host
    encryption status in real time. Recovery keys are escrowed and accessible to
    authorized admins.
  links: []
- name: Flatpak
  slug: flatpak
  categories:
    - Linux
  searchKeywords: flatpak linux sandboxed apps flathub gnome kde universal package
  definition: A universal Linux application packaging and runtime framework that
    ships apps in sandboxed containers and runs them across distributions.
    Flatpak is widely used for desktop Linux apps and is the default app
    delivery format on Fedora's Silverblue and many community distributions.
  fleetNote: Fleet reports Flatpak-installed software in Linux inventory and can
    deploy Flatpak applications as custom software targeting the right Linux
    fleets.
  links: []
- name: Fleet Desktop
  slug: fleet-desktop
  categories:
    - MDM
