- name: CIS 2.3.1.3 - Rename administrator account
  platform: windows
  description: "Ensure 'Accounts: Rename administrator account' is configured. The built-in Administrator account should be renamed to reduce attack surface."
  resolution: "Run the remediation script to rename the Administrator account via Local Security Policy."
  query: SELECT 1 FROM users WHERE uid = 500 AND username != 'Administrator';
  run_script:
    path: "../scripts/configure-local-security-policy.ps1"

- name: CIS 2.3.1.4 - Rename guest account
  platform: windows
  description: "Ensure 'Accounts: Rename guest account' is configured. The built-in Guest account should be renamed to reduce attack surface."
  resolution: "Run the remediation script to rename the Guest account via Local Security Policy."
  query: SELECT 1 FROM users WHERE uid = 501 AND username != 'Guest';
  run_script:
    path: "../scripts/configure-local-security-policy.ps1"

- name: CIS 2.3.2.1 - Force audit policy subcategory settings
  platform: windows
  description: "Ensure 'Audit: Force audit policy subcategory settings (Windows Vista or later) to override audit policy category settings' is set to 'Enabled'."
  resolution: "Run the remediation script to enable this setting via Local Security Policy."
  query: SELECT 1 FROM registry WHERE path = 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Lsa\SCENoApplyLegacyAuditPolicy' AND data = '1';
  run_script:
    path: "../scripts/configure-local-security-policy.ps1"

