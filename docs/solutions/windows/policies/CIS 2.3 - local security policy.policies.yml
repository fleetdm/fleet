  query: SELECT 1 FROM registry WHERE path = 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Lsa\CrashOnAuditFail' AND data = '0';
  run_script:
    path: "../scripts/configure-local-security-policy.ps1"

