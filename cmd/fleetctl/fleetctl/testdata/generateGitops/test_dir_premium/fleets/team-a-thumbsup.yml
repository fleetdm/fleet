agent_options:
  config:
    decorators:
      load:
      - SELECT uuid AS host_uuid FROM system_info;
      - SELECT hostname AS hostname FROM system_info;
    options:
      disable_distributed: false
      distributed_interval: 10
      distributed_plugin: tls
      distributed_tls_max_attempts: 3
      logger_tls_endpoint: /api/osquery/log
      logger_tls_period: 10
      pack_delimiter: /
  update_channels:
    desktop: edge
    orbit: edge
    osqueryd: edge
controls:
  android_enabled_and_configured: true
  android_settings:
    certificates:
    - certificate_authority_name: DIGIDOO
      name: my_certypoo
      subject_alternative_name: DNS=wifi.example.com, UPN=$FLEET_VAR_HOST_END_USER_IDP_USERNAME
      subject_name: CN=OU=$FLEET_VAR_HOST_UUID/ST=$FLEET_VAR_HOST_HARDWARE_SERIAL
  apple_settings:
    configuration_profiles:
    - path: "../lib/team-a-👍/profiles/team-macos-mobileconfig-profile.mobileconfig"
  enable_disk_encryption: true
  enable_recovery_lock_password: false
  ios_updates:
    deadline: "2021-12-31"
    minimum_version: "98.1"
    update_new_hosts:
  ipados_updates:
    deadline: "2022-12-31"
    minimum_version: "98.2"
    update_new_hosts:
  macos_updates:
    deadline: "2020-12-31"
    minimum_version: "95.1"
    update_new_hosts: true
  scripts:
  - path: "../lib/team-a-👍/scripts/Script B.ps1"
  windows_enabled_and_configured: true
  windows_require_bitlocker_pin: false
  windows_updates:
    deadline_days: 95
    grace_period_days: 92
labels:
name: "Team A 👍"
policies:
- calendar_events_enabled: false
  conditional_access_enabled: true
  critical: false
  description: This is a team policy
  name: Team Policy
  platform: linux,windows
  query: SELECT * FROM team_policy WHERE id = 1
  resolution: Do a team thing
  type: dynamic
  webhooks_and_tickets_enabled: true
- calendar_events_enabled: false
  conditional_access_enabled: true
  critical: false
  description: This is a team patch policy
  fleet_maintained_app_slug: foo/darwin
  name: Team patch policy
  platform: linux,windows
  resolution: Do a team thing
  type: patch
  webhooks_and_tickets_enabled: true
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: This is a team policy with VPP app automation
  install_software:
    app_store_id: "1234567890"
  name: Team VPP policy
  platform: darwin
  query: SELECT * FROM team_policy WHERE id = 3
  resolution: Install the app
  type: dynamic
  webhooks_and_tickets_enabled: true
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: This is a team policy with FMA install automation
  install_software:
    fleet_maintained_app_slug: fma1/darwin
  name: Team FMA install policy
  platform: darwin
  query: SELECT 1 FROM filevault_status WHERE status LIKE '%on%';
  resolution: Install the FMA
  type: dynamic
  webhooks_and_tickets_enabled: false
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: This is a team policy with custom package install automation
  install_software:
    hash_sha256: software-package-hash # My Software Package (my-software.pkg) version 13.37
  name: Team package install policy
  platform: linux,windows
  query: SELECT 1 FROM mounts WHERE path = '/' AND CAST(blocks_available AS REAL)
    / blocks > 0.10;
  resolution: Install the package
  type: dynamic
  webhooks_and_tickets_enabled: false
reports:
- automations_enabled: true
  description: This is a team query
  discard_data: false
  interval: 1800
  logging: stderr
  min_osquery_version: 4.5.6
  name: Team Query
  observer_can_run: false
  platform: linux,windows
  query: SELECT * FROM plist WHERE path LIKE '/Users/%/Library/Preferences/com.apple.CloudSubscriptionFeatures.optIn.plist';
settings:
  features:
    enable_host_users: true
    enable_software_inventory: true
    historical_data:
      uptime: true
      vulnerabilities: true
  host_expiry_settings:
    host_expiry_enabled: false
    host_expiry_window: 1
  integrations:
    conditional_access_enabled: true
    google_calendar:
      enable_calendar_events: true
      webhook_url: https://some-team-google-calendar-webhook.com
  secrets:
  - secret: # TODO: Add your enroll secrets here
  webhook_settings:
    failing_policies_webhook:
      destination_url: https://some-team-failing_policies-webhook.com
      enable_failing_policies_webhook: false
      host_batch_size: 4
    host_status_webhook:
      days_count: 3
      destination_url: https://some-team-host-status-webhook.com
      enable_host_status_webhook: false
      host_percentage: 2
software:
  app_store_apps:
  - app_store_id: "1234567890"
    categories:
    - Productivity
    - Utilities
    icon:
      path: "../lib/team-a-👍/icons/my-app-store-app-darwin-icon.png"
    labels_exclude_any:
    - Label C
    - Label D
    platform: darwin
    self_service: true
  - app_store_id: "55566677778"
    icon:
      path: "../lib/team-a-👍/icons/my-setup-experience-app-android-icon.png"
    labels_include_all:
    - Label C
    - Label D
    platform: android
    self_service: true
    setup_experience: true
  - app_store_id: "9999888877"
    auto_update_enabled: true
    auto_update_window_end: "03:00"
    auto_update_window_start: "01:00"
    icon:
      path: "../lib/team-a-👍/icons/my-ios-auto-update-app-ios-icon.png"
    labels_include_all:
    - Label C
    - Label D
    platform: ios
  fleet_maintained_apps:
  - categories:
    - Browsers
    icon:
      path: "../lib/team-a-👍/icons/my-fma-darwin-icon.png"
    labels_include_any:
    - Label A
    - Label B
    post_install_script:
      path: "../lib/team-a-👍/scripts/my-fma-darwin-postinstall"
    pre_install_query:
      path: "../lib/team-a-👍/queries/my-fma-darwin-preinstallquery.yml"
    self_service: true
    setup_experience: true
    slug: fma1/darwin
  - icon:
      path: "../lib/team-a-👍/icons/my-windows-fma-windows-icon.png"
    labels_include_all:
    - Label A
    - Label B
    self_service: true
    slug: fma2/windows
  - self_service: true
    slug: fma3/windows
  packages:
  - categories:
    - Browsers
    hash_sha256: software-package-hash # My Software Package (my-software.pkg) version 13.37
    icon:
      path: "../lib/team-a-👍/icons/my-software-package-darwin-icon.png"
    install_script:
      path: "../lib/team-a-👍/scripts/my-software-package-darwin-install"
    labels_include_any:
    - Label A
    - Label B
    post_install_script:
      path: "../lib/team-a-👍/scripts/my-software-package-darwin-postinstall"
    pre_install_query:
      path: "../lib/team-a-👍/queries/my-software-package-darwin-preinstallquery.yml"
    self_service: true
    setup_experience: true
    uninstall_script:
      path: "../lib/team-a-👍/scripts/my-software-package-darwin-uninstall"
    url: https://example.com/download/my-software.pkg
