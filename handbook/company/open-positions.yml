- jobTitle: 🚀 Software Engineer
  department: Engineering
  hiringManagerName: Luke Heath
  hiringManagerGithubUsername: lukeheath
  hiringManagerLinkedInUrl: https://www.linkedin.com/in/lukeheath/
  onTargetEarnings: "$80,000 - $225,000+"
  responsibilities: |
    - 🧑‍🔬 Design, develop, test, and maintain a state-of-the-art Golang application that includes robust APIs to support mobile and desktop clients.
    - 🛠 Write code and tests, build prototypes, resolve issues, and profile and analyze bottlenecks.
    - 💭 Manage and optimize scalable distributed systems in the cloud.
    - 🤝 Collaborate closely with product designers to understand requirements and translate them into actionable specifications.
    - 🚀 Participate in engineering workflows including daily standups, demos, and continuous planning.
    - 🌟 Contribute to the overall success of your [product group](https://fleetdm.com/handbook/company/product-groups#current-product-groups) by ensuring users receive valuable new features frequently.
  experience: |
    - 💭 3+ years of experience in backend/SaaS development.
    - 🦉 Proficient in Go or a similar language. You write well-structured, maintainable backend code using interfaces, composition, and clear abstractions.
    - 🦉 Translate requirements into well-designed and functional software.
    - 🤝 Communicate regularly with stakeholders, product managers, quality assurance teams, and other developers regarding progress on long-term technology roadmap.
    - 🧪 Collaborate with Quality Assurance Engineers to ship high quality changes.
    - 🤖 Use AI tools (Claude, Copilot, etc.) as part of your daily engineering workflow to move faster and produce higher-quality work.
