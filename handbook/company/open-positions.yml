- jobTitle: 💸 Controller
  department: Finance 
  hiringManagerName: Tina Ong
  hiringManagerLinkedInUrl: https://www.linkedin.com/in/ongtina/ 
  hiringManagerGithubUsername: rfoo2015 
  onTargetEarnings: "$150,000 - $190,000"
  responsibilities: |
    - 📊 Own the full accounting cycle, including month-end and year-end close, ensuring accurate and timely financial reporting across Fleet.
    - 🤝 Partner closely with leadership, operations, and department heads to provide financial insights that drive strategic decision-making.
    - 📈 Build and maintain scalable accounting processes, internal controls, and policies that support Fleet's growth as a fast-moving, remote-first company.
    - 🎯 Oversee accounts payable, accounts receivable, payroll, and general ledger functions, ensuring accuracy and compliance at every step.
    - 🚀 Manage relationships with external tax advisors for accurate, timely filings and compliance across sales and payroll tax obligations.
    - 🔍 Own audit-readiness and manage financial statement audits end-to-end, in collaboration with external auditors.
    - 🌐 Collaborate extensively with internal teams such as People, Sales, and Marketing to support budgeting, forecasting, and vendor management.
    - 🧠 Identify opportunities to improve financial systems and tooling, implementing best practices that reduce manual work and increase visibility.
    - 💡 Provide ad hoc financial analysis and modeling to help the business evaluate new opportunities, partnerships, and investments.
  experience: |
     -🦉 5+ years of progressive accounting experience, ideally in a high-growth B2B SaaS or technology company, with at least 2 years in a controller role.
    - 📜 Active CPA license, and managed audit process from start to finish. 
    - 🗣️ Strong communicator who can translate complex financial data into clear, actionable insights for both technical and non-technical stakeholders.
    - ⚙️ Systems-oriented and detail-driven, with a track record of building and improving accounting processes, controls, and workflows from the ground up.
    - ⚡ Agile and adaptable, comfortable operating in a fast-paced, remote-first environment where priorities shift and ownership is encouraged.
    - 🧑‍💻 Comfortable working with modern tooling and excited to leverage technology to automate and streamline financial operations.
    - 🧪 Experience with tools like QuickBooks, Salesforce, Bill.com, Brex, Google Suite, and Slack in an all-remote setting.
    - ➕ Bonus: Experience with AI-native tools (e.g. Rillet, Campfire, Tabs, Aleph) and building AI-assisted workflows for financial reporting and reconciliation; familiarity with open-source or device management concepts.


