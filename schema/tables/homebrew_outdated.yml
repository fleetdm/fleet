name: homebrew_outdated
columns:
  - name: app_name
    description: Name of the installed App (for Casks)
    type: text
    required: false
  - name: auto_updates
    description: 1 if the cask auto-updates otherwise 0
    type: integer
    required: false
  - name: name
    description: Package name
    type: text
    required: false
  - name: install_path
    description: Package install path
    type: text
    required: false
  - name: type
    description: Package type ('formula' or 'cask')
    type: text
    required: false
  - name: installed_version
    description: Current 'linked' version
    type: text
    required: false
  - name: current_version
    description: Latest available version from Homebrew (not the installed version). Empty if unavailable.
    type: text
    required: false
examples: |-
  Check the installed and latest available version of an outdated package. This
  example checks ffmpeg, which should be replaced by the actual package you want
  to check for. This is useful for finding outdated or vulnerable installs,
  though Fleet will detect vulnerable packages automatically.

  ```
  SELECT installed_version, current_version FROM homebrew_outdated WHERE name = 'ffmpeg';
  ```
