  /api/v1/fleet/hosts/{id}/software:
    get:
      operationId: getHostSoftware
      tags:
        - Hosts
      summary: Get host's software
      parameters:
        - name: id
          in: path
          required: true
          description: The host's ID.
          schema:
            type: integer
        - name: query
          in: query
          required: false
          description: Search query keywords. Searchable fields include `name`.
          schema:
            type: string
        - name: available_for_install
          in: query
          required: false
          description: If `true` or `1`, only list software that is available for install (added by the user). Default is `false`.
          schema:
            type: boolean
        - name: self_service
          in: query
          required: false
          description: If `true` or `1`, only lists self-service software. Default is `false`.
          schema:
            type: boolean
        - name: vulnerable
          in: query
          required: false
          description: If `true` or `1`, only list software that have vulnerabilities. Default is `false`.
          schema:
            type: boolean
        - name: page
          in: query
          required: false
          description: Page number of the results to fetch.
          schema:
            type: integer
        - name: per_page
          in: query
          required: false
          description: Results per page.
          schema:
            type: integer
        - name: order_key
          in: query
          required: false
          description: What to order results by. Options include `"name"`. Default is `"name"`.
          schema:
            type: string
        - name: order_direction
          in: query
          required: false
          description: '**Requires `order_key`**. The direction of the order given the order key. Options include `"asc"` and `"desc"`. Default is `"asc"`.'
          schema:
            type: string
        - name: min_cvss_score
          in: query
          required: false
          description: _Available in Fleet Premium_. Filters to include only software with vulnerabilities that have a CVSS version 3.x base score higher than the specified value.
          schema:
            type: integer
        - name: max_cvss_score
          in: query
          required: false
          description: _Available in Fleet Premium_. Filters to only include software with vulnerabilities that have a CVSS version 3.x base score lower than what's specified.
          schema:
            type: integer
        - name: exploit
          in: query
          required: false
          description: "_Available in Fleet Premium_. If `true`, filters to only include software with vulnerabilities that have been actively exploited in the wild (`cisa_known_exploit: true`). Default is `false`."
          schema:
            type: boolean
        - name: after
          in: query
          required: false
          description: The value to get results after. This needs `order_key` defined, as that's the column that would be used.
          schema:
            type: string
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  software:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
