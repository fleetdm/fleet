      tags:
        - Hosts
      summary: Get hosts report in CSV
      description: Returns the list of hosts in CSV format.
      parameters:
        - name: format
          in: query
          required: false
          description: '**Required**, must be "csv" (only supported format for now).'
          schema:
            type: string
        - name: columns
          in: query
          required: false
          description: Comma-delimited list of columns to include in the report (returns all columns if none is specified).
          schema:
            type: string
        - name: order_key
          in: query
          required: false
          description: What to order results by. Can be any column in the hosts table.
          schema:
            type: string
        - name: order_direction
          in: query
          required: false
          description: '**Requires `order_key`**. The direction of the order given the order key. Options include `"asc"` and `"desc"`. Default is `"asc"`.'
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Indicates the status of the hosts to return. Can either be 'new', 'online', 'offline', 'mia' or 'missing'.
          schema:
            type: string
        - name: query
          in: query
          required: false
          description: Search query keywords. Searchable fields include `hostname`, `hardware_serial`, `uuid`, `ipv4`, and end user email addresses.
          schema:
            type: string
        - name: fleet_id
          in: query
          required: false
          description: _Available in Fleet Premium_. Filters the hosts to only include hosts in the specified fleet.
          schema:
            type: integer
        - name: policy_id
          in: query
          required: false
          description: The ID of the policy to filter hosts by.
          schema:
            type: integer
        - name: policy_response
          in: query
          required: false
          description: "**Requires `policy_id`**. Valid options are 'passing' or 'failing'. **Note: If `policy_id` is specified _without_ including `policy_response`, this will also return hosts where the policy is not configured to run or failed to run.**"
          schema:
            type: string
        - name: software_version_id
          in: query
          required: false
          description: The ID of the software version to filter hosts by.
          schema:
            type: integer
        - name: software_title_id
          in: query
          required: false
          description: The ID of the software title to filter hosts by.
          schema:
            type: integer
        - name: os_version_id
          in: query
          required: false
          description: The ID of the operating system version to filter hosts by.
          schema:
            type: integer
        - name: os_name
          in: query
          required: false
          description: The name of the operating system to filter hosts by. `os_version` must also be specified with `os_name`
          schema:
            type: string
        - name: os_version
          in: query
          required: false
          description: The version of the operating system to filter hosts by. `os_name` must also be specified with `os_version`
          schema:
            type: string
        - name: vulnerability
          in: query
          required: false
          description: The cve to filter hosts by (including "cve-" prefix, case-insensitive).
          schema:
            type: string
        - name: mdm_id
          in: query
          required: false
          description: The ID of the _mobile device management_ (MDM) solution to filter hosts by (that is, filter hosts that use a specific MDM provider and URL).
          schema:
            type: integer
        - name: mdm_name
          in: query
          required: false
          description: The name of the _mobile device management_ (MDM) solution to filter hosts by (that is, filter hosts that use a specific MDM provider).
          schema:
            type: string
        - name: mdm_enrollment_status
          in: query
          required: false
          description: The _mobile device management_ (MDM) enrollment status to filter hosts by. Valid options are 'manual', 'automatic', 'enrolled', 'pending', or 'unenrolled'. 'pending' only includes Apple (macOS, iOS, iPadOS) hosts in Apple Business Manager (ABM) that are not yet enrolled to Fleet.
          schema:
            type: string
        - name: macos_settings
          in: query
          required: false
          description: "Filters the hosts by the status of the _mobile device management_ (MDM) profiles applied to hosts. Valid options are 'verified', 'verifying', 'pending', or 'failed'. **Note: If this filter is used in Fleet Premium without a fleet ID filter, the results include only hosts that are \"Unassigned\".**"
          schema:
            type: string
        - name: munki_issue_id
          in: query
          required: false
          description: The ID of the _munki issue_ (a Munki-reported error or warning message) to filter hosts by (that is, filter hosts that are affected by that corresponding error or warning message).
          schema:
            type: integer
        - name: low_disk_space
          in: query
          required: false
          description: _Available in Fleet Premium_. Filters the hosts to only include hosts with less GB of disk space available than this value. Must be a number between 1-100.
          schema:
            type: integer
        - name: label_id
          in: query
          required: false
          description: A valid label ID. Can only be used in combination with `order_key`, `order_direction`, `status`, `query` and `fleet_id`.
          schema:
            type: integer
        - name: bootstrap_package
          in: query
          required: false
          description: "_Available in Fleet Premium_. Filters the hosts by the status of the MDM bootstrap package on the host. Valid options are 'installed', 'pending', or 'failed'. **Note: If this filter is used in Fleet Premium without a fleet ID filter, the results include only hosts that are \"Unassigned\".**"
          schema:
            type: string
        - name: disable_failing_policies
          in: query
          required: false
          description: If `true`, hosts will return failing policies as 0 (returned as the `issues` column) regardless of whether there are any that failed for the host. This is meant to be used when increased performance is needed in exchange for the extra information.
          schema:
            type: boolean
      responses:
        "200":
          description: Successful response.
