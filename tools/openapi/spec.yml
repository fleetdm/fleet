  /api/v1/fleet/hosts/{id}/certificates:
    get:
      operationId: getHostCertificates
      tags:
        - Hosts
      summary: Get host's certificates
      description: Retrieves the certificates installed on a host.
      parameters:
        - name: id
          in: path
          required: true
          description: The host's id.
          schema:
            type: integer
        - name: page
          in: query
          required: false
          description: Page number of the results to fetch.
          schema:
            type: integer
        - name: per_page
          in: query
          required: false
          description: Results per page.
          schema:
            type: integer
        - name: order_key
          in: query
          required: false
          description: What to order results by. Options include `common_name` and `not_valid_after`. Default is `common_name`
          schema:
            type: string
        - name: order_direction
          in: query
          required: false
          description: '**Requires `order_key`**. The direction of the order given the order key. Options include `"asc"` and `"desc"`. Default is `"asc"`.'
          schema:
            type: string
        - name: after
          in: query
          required: false
          description: The value to get results after. This needs `order_key` defined, as that's the column that would be used.
          schema:
            type: string
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  certificates:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        not_valid_after:
                          type: string
                          format: date-time
                        not_valid_before:
                          type: string
                          format: date-time
                        certificate_authority:
                          type: boolean
                        common_name:
                          type: string
                        key_algorithm:
                          type: string
                        key_strength:
                          type: integer
                        key_usage:
                          type: string
                        serial:
                          type: integer
                        signing_algorithm:
                          type: string
                        subject:
                          type: object
                          properties:
                            country:
                              type: string
                            organization:
                              type: string
                            organizational_unit:
                              type: string
                            common_name:
                              type: string
                        issuer:
                          type: object
                          properties:
                            country:
                              type: string
                            organization:
                              type: string
                            organizational_unit:
                              type: string
                            common_name:
                              type: string
                        source:
                          type: string
                        username:
                          type: string
                  meta:
                    type: object
                    properties:
                      has_next_results:
                        type: boolean
                      has_previous_results:
                        type: boolean
              example:
                certificates:
                  - id: 3
                    not_valid_after: 2021-08-19T02:02:17Z
                    not_valid_before: 2021-08-19T02:02:17Z
                    certificate_authority: true
                    common_name: FleetDM
                    key_algorithm: rsaEncryption
                    key_strength: 2048
                    key_usage: CRL Sign, Key Cert Sign
                    serial: 1
                    signing_algorithm: sha256WithRSAEncryption
                    subject:
                      country: US
                      organization: Fleet Device Management Inc.
                      organizational_unit: Fleet Device Management Inc.
                      common_name: FleetDM
                    issuer:
                      country: US
                      organization: Fleet Device Management Inc.
                      organizational_unit: Fleet Device Management Inc.
                      common_name: FleetDM
                    source: system
                    username: ""
                meta:
                  has_next_results: false
                  has_previous_results: false
