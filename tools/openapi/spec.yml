openapi: 3.1.0
info:
  title: Fleet REST API
  version: 0.0.1-poc
  description: Auto-generated from [Fleet's REST API docs](https://fleetdm.com/docs/rest-api/rest-api). To submit edits or fixes, update the [source docs](https://github.com/fleetdm/fleet/blob/main/docs/REST%20API/rest-api.md).
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://fleet.example.com
    description: Replace with your Fleet server URL.
tags:
  - name: Hosts
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 'API token passed as "Authorization: Bearer <token>".'
paths:
  /api/v1/fleet/hosts:
    get:
      operationId: listHosts
      tags:
        - Hosts
      summary: List hosts
      description: Returns a paginated list of hosts enrolled in Fleet. Supports filtering, ordering, and optional inclusion of related data (software, policies, users, labels, device status).
      parameters:
        - name: page
          in: query
          required: false
          description: Page number of the results to fetch.
          schema:
            type: integer
        - name: per_page
          in: query
          required: false
          description: Results per page.
          schema:
            type: integer
        - name: order_key
          in: query
          required: false
          description: What to order results by. Can be any column in the hosts table.
          schema:
            type: string
        - name: after
          in: query
          required: false
          description: The value to get results after. This needs `order_key` defined, as that's the column that would be used. **Note:** Use `page` instead of `after`
          schema:
            type: string
        - name: order_direction
          in: query
          required: false
          description: '**Requires `order_key`**. The direction of the order given the order key. Options include `"asc"` and `"desc"`. Default is `"asc"`.'
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Indicates the status of the hosts to return. Can either be 'new', 'online', 'offline', 'mia' or 'missing'.
          schema:
            type: string
        - name: query
          in: query
          required: false
          description: Search query keywords. Searchable fields include `hostname`, `hardware_serial`, `uuid`, `ipv4`, and end user email addresses.
          schema:
            type: string
        - name: additional_info_filters
          in: query
          required: false
          description: A comma-delimited list of fields to include in each host's `additional` object. This query is populated by the `additional_queries` in the `features` section of the configuration YAML.
          schema:
            type: string
        - name: fleet_id
          in: query
          required: false
          description: _Available in Fleet Premium_. Filters to only include hosts in the specified fleet. Use `0` to filter by "Unassigned" hosts.
          schema:
            type: integer
        - name: policy_id
          in: query
          required: false
          description: The ID of the policy to filter hosts by.
          schema:
            type: integer
        - name: policy_response
          in: query
          required: false
          description: "**Requires `policy_id`**. Valid options are 'passing' or 'failing'."
          schema:
            type: string
        - name: software_version_id
          in: query
          required: false
          description: The ID of the software version to filter hosts by.
          schema:
            type: integer
        - name: software_title_id
          in: query
          required: false
          description: The ID of the software title to filter hosts by.
          schema:
            type: integer
        - name: software_status
          in: query
          required: false
          description: "The status of the software install to filter hosts by. One of: `pending_install`, `failed_install`, `installed`, `pending_uninstall`, `failed_uninstall`, `pending`, or `failed`. Mutually exclusive with `software_version_id`, and must be supplied if `software_title_id` is set."
          schema:
            type: string
        - name: os_version_id
          in: query
          required: false
          description: The ID of the operating system version to filter hosts by.
          schema:
            type: integer
        - name: os_name
          in: query
          required: false
          description: The name of the operating system to filter hosts by. `os_version` must also be specified with `os_name`
          schema:
            type: string
        - name: os_version
          in: query
          required: false
          description: The version of the operating system to filter hosts by. `os_name` must also be specified with `os_version`
          schema:
            type: string
        - name: vulnerability
          in: query
          required: false
          description: The cve to filter hosts by (including "cve-" prefix, case-insensitive).
          schema:
            type: string
        - name: device_mapping
          in: query
          required: false
          description: Indicates whether `device_mapping` should be included for each host.
          schema:
            type: boolean
        - name: mdm_id
          in: query
          required: false
          description: The ID of the _mobile device management_ (MDM) solution to filter hosts by (that is, filter hosts that use a specific MDM provider and URL).
          schema:
            type: integer
        - name: mdm_name
          in: query
          required: false
          description: The name of the _mobile device management_ (MDM) solution to filter hosts by (that is, filter hosts that use a specific MDM provider).
          schema:
            type: string
        - name: mdm_enrollment_status
          in: query
          required: false
          description: The _mobile device management_ (MDM) enrollment status to filter hosts by. Valid options are 'manual', 'automatic', 'enrolled', 'pending', or 'unenrolled'. 'pending' only includes Apple (macOS, iOS, iPadOS) hosts in Apple Business Manager (ABM) that are not yet enrolled to Fleet.
          schema:
            type: string
        - name: connected_to_fleet
          in: query
          required: false
          description: Filter hosts that are talking to this Fleet server for MDM features. In rare cases, hosts can be enrolled to one Fleet server but talk to a different Fleet server for MDM features. In this case, the value would be `false`. Always `false` for Linux hosts.
          schema:
            type: boolean
        - name: macos_settings
          in: query
          required: false
          description: "Filters the hosts by the status of the _mobile device management_ (MDM) profiles applied to hosts. Valid options are 'verified', 'verifying', 'pending', or 'failed'. **Note: If this filter is used in Fleet Premium without a fleet ID filter, the results include only \"Unassigned\" hosts.**"
          schema:
            type: string
        - name: munki_issue_id
          in: query
          required: false
          description: The ID of the _munki issue_ (a Munki-reported error or warning message) to filter hosts by (that is, filter hosts that are affected by that corresponding error or warning message).
          schema:
            type: integer
        - name: low_disk_space
          in: query
          required: false
          description: _Available in Fleet Premium_. Filters the hosts to only include hosts with less GB of disk space available than this value. Must be a number between 1-100.
          schema:
            type: integer
        - name: disable_failing_policies
          in: query
          required: false
          description: If `true`, hosts will return failing policies as 0 regardless of whether there are any that failed for the host. This is meant to be used when increased performance is needed in exchange for the extra information.
          schema:
            type: boolean
        - name: macos_settings_disk_encryption
          in: query
          required: false
          description: Filters the hosts by disk encryption status. Valid options are 'verified', 'verifying', 'action_required', 'enforcing', 'failed', or 'removing_enforcement'.
          schema:
            type: string
        - name: bootstrap_package
          in: query
          required: false
          description: _Available in Fleet Premium_. Filters the hosts by the status of the MDM bootstrap package on the host. Valid options are 'installed', 'pending', or 'failed'.
          schema:
            type: string
        - name: os_settings
          in: query
          required: false
          description: "Filters the hosts by the status of the operating system settings applied to the hosts. Valid options are 'verified', 'verifying', 'pending', or 'failed'. **Note: If this filter is used in Fleet Premium without a fleet ID filter, the results include only \"Unassigned\" hosts.**"
          schema:
            type: string
        - name: os_settings_disk_encryption
          in: query
          required: false
          description: "Filters the hosts by disk encryption status. Valid options are 'verified', 'verifying', 'action_required', 'enforcing', 'failed', or 'removing_enforcement'. **Note: If this filter is used in Fleet Premium without a fleet ID filter, the results include only \"Unassigned\" hosts.**"
          schema:
            type: string
        - name: populate_software
          in: query
          required: false
          description: If `false` (or omitted), omits installed software details for each host. If `"without_vulnerability_details"`, include a list of installed software for each host, including which CVEs apply to the installed software versions. `true` adds vulnerability description, CVSS score, and other details when using Fleet Premium. See notes below on performance.
          schema:
            type: string
        - name: populate_policies
          in: query
          required: false
          description: If `true`, the response will include policy data for each host, including Fleet-maintained policies.
          schema:
            type: boolean
        - name: populate_users
          in: query
          required: false
          description: If `true`, the response will include user data for each host.
          schema:
            type: boolean
        - name: populate_labels
          in: query
          required: false
          description: If `true`, the response will include labels for each host.
          schema:
            type: boolean
        - name: include_device_status
          in: query
          required: false
          description: If `true`, the response will include lock and wipe status (`mdm.device_status`) and `mdm.pending_action` information for each host.
          schema:
            type: boolean
        - name: profile_uuid
          in: query
          required: false
          description: "**Requires `profile_status`**. The UUID of the profile to download."
          schema:
            type: string
        - name: profile_status
          in: query
          required: false
          description: "**Requires `profile_uuid`**. Valid options are 'verified', 'verifying', 'pending', or 'failed'."
          schema:
            type: string
        - name: dep_profile_error
          in: query
          required: false
          description: "If `true`, the response will only include Apple MDM hosts with DEP profile assignment errors(`mdm.dep_profile_error: true`)."
          schema:
            type: boolean
        - name: dep_assign_profile_response
          in: query
          required: false
          description: Filters the hosts by DEP profile assignment status. Valid options are 'SUCCESS', 'FAILED', 'THROTTLED' or 'NOT_ACCESSIBLE'. Only Apple hosts which are, or were assigned to Fleet in ABM will be returned.
          schema:
            type: string
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
