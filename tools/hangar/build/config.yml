# This file contains the configuration for this project.
# When you update `info`, run `wails3 task common:update:build-assets` to update the assets.
# Note that this will overwrite any changes you have made to the assets.
version: '3'

# This information is used to generate the build assets.
info:
  companyName: "Fleet Device Management" # The name of the company
  productName: "Fleet Hangar" # The name of the application
  productIdentifier: "com.fleetdm.fleet-hangar" # The unique product identifier
  description: "Desktop control panel for the Fleet dev environment" # The application description
  copyright: "(c) 2026, Fleet Device Management" # Copyright text
  comments: "https://github.com/fleetdm/fleet/tree/main/tools/hangar" # Comments
  version: "1.0.0" # The application version
  # cfBundleIconName: "appicon" # The macOS icon name in Assets.car icon bundles (optional)
  #                               # Should match the name of your .icon file without the extension
  #                               # If not set and Assets.car exists, defaults to "appicon"

# Dev mode configuration
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - "*_test.go"
    watched_extension:
      - "*.go"
      - "*.js" # Watch for changes to JS/TS files included using the //wails:include directive.
      - "*.ts" # The frontend directory will be excluded entirely by the setting above.
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary