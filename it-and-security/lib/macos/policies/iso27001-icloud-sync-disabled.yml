- name: macOS - iCloud Desktop and Documents sync disabled (ISO 27001)
  query: SELECT 1 FROM managed_policies WHERE domain = 'com.apple.icloud.managed' AND name = 'DisableCloudSync' AND value = '1' LIMIT 1;
  critical: false
  description: >-
    Checks that iCloud Desktop and Documents sync is disabled via MDM. ISO 27001
    Annex A control A.5.33 (Protection of records) and A.8.11 (Data masking)
    require that organizational data is protected from unauthorized disclosure
    and that corporate data is not automatically synced to personal cloud
    storage services.
  resolution: >-
    Contact your IT administrator to ensure your Mac is receiving an MDM profile
    that disables iCloud Desktop and Documents sync. This should be
    automatically enforced by Fleet.
  platform: darwin
