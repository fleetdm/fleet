- name: macOS - Firewall logging enabled (ISO 27001)
  query: SELECT 1 FROM managed_policies WHERE domain = 'com.apple.security.firewall' AND name = 'EnableLogging' AND value = '1' LIMIT 1;
  critical: false
  description: >-
    Checks that firewall logging is enabled via MDM. ISO 27001 Annex A control
    A.8.15 (Logging) requires that logs recording activities, exceptions, faults,
    and other relevant events are produced, stored, protected, and analysed to
    support security monitoring and incident response.
  resolution: >-
    Contact your IT administrator to ensure your Mac is receiving an MDM profile
    that enables firewall logging. This should be automatically enforced by
    Fleet.
  platform: darwin
