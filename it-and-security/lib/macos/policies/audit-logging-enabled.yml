- name: macOS - Audit logging enabled (ISO 27001 A.12.4)
  query: |
    SELECT 1 FROM launchd WHERE name = 'com.apple.auditd' AND status = 'running';
  critical: false
  description: |-
    Verifies that the audit daemon (auditd) is running on this Mac, ensuring security events are logged. This supports ISO 27001 Annex A.12.4 (Logging and Monitoring).
  resolution: |-
    The audit daemon should be running by default on macOS. If you are failing this policy, try restarting your Mac.

    If the issue persists, please reach out in #help-dogfooding.
  platform: darwin
