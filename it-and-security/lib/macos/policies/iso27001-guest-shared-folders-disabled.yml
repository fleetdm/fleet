- name: macOS - Guest access to shared folders disabled (ISO 27001)
  query: SELECT 1 FROM managed_policies WHERE domain = 'com.apple.AppleFileServer' AND name = 'guestAccess' AND value = '0' LIMIT 1;
  critical: false
  description: >-
    Checks that guest access to shared folders is disabled via MDM. ISO 27001
    Annex A control A.5.15 (Access control) requires that access to shared
    resources is restricted to authorized users, preventing unauthenticated
    access to shared folders.
  resolution: >-
    Contact your IT administrator to ensure your Mac is receiving an MDM profile
    that disables guest access to shared folders. This should be automatically
    enforced by Fleet.
  platform: darwin
