- name: macOS - Nudge assets installed
  query: SELECT 1 WHERE EXISTS (SELECT 1 FROM package_receipts WHERE package_id = "com.fleetdm.Nudge.assets");
  critical: true
  description: This policy ensures the Nudge assets are installed.
  resolution: "If you are failing this policy, click Refetch. If you are still failing after Refetch completes, drop a note in #help-it."
  install_software:
    package_path: ../software/nudge-assets.yml
  platform: darwin
