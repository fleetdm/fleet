- name: macOS - Chrome up to date
  query: SELECT 1 WHERE NOT EXISTS (SELECT 1 FROM apps WHERE name = 'Google Chrome.app' AND version_compare(bundle_short_version, '143.0.7499.192') < 0);
  critical: false
  description: The host may have an outdated version of Google Chrome, potentially risking security vulnerabilities (CVE-2026-0628) or compatibility issues.
  resolution: Download the latest version from self-service or check for updates using Chrome's built-in update functionality. You can also delete Chrome if you are no longer using it.
  platform: darwin
  calendar_events_enabled: false
