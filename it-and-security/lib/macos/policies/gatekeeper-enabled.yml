- name: macOS - Gatekeeper enabled
  query: SELECT 1 FROM gatekeeper WHERE assessments_enabled = 1;
  critical: false
  description: |-
    Verifies Gatekeeper is enabled so only trusted software runs.
    Supports ISO 27001 A.8.19 (secure installation of software) and A.8.7 (malware protection), and SOC 2 CC 6.8.
  resolution: |-
    Gatekeeper should be enforced by MDM (`enable-gatekeeper.mobileconfig`). Contact IT if this policy fails after a restart.
  platform: darwin
