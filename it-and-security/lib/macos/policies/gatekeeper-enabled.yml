- name: macOS - Gatekeeper enabled (ISO 27001 A.12)
  query: SELECT 1 FROM gatekeeper WHERE assessments_enabled = 1;
  critical: false
  description: |-
    Verifies that Gatekeeper is enabled on this Mac, ensuring only trusted software can run. This supports ISO 27001 Annex A.12 (Operations Security) for malware protection.
  resolution: |-
    Gatekeeper should be automatically enforced by Fleet via an MDM configuration profile. If you are failing this policy, check System Settings > Privacy & Security and ensure "App Store and identified developers" is selected.

    If the issue persists, please reach out in #help-dogfooding.
  platform: darwin
