- name: macOS - NPM up to date
  query: SELECT 1 WHERE NOT EXISTS (SELECT 1 FROM npm_packages WHERE name = 'npm' AND directory LIKE '/usr/local/lib/node_modules/%' AND version_compare(version, '11.11.0') < 0) AND NOT EXISTS (SELECT 1 FROM npm_packages WHERE name = 'npm' AND directory LIKE '/opt/homebrew/lib/node_modules/%' AND version_compare(version, '11.11.0') < 0);
  critical: false
  description: The host may have an outdated version of NPM (Node Package Manager), potentially risking security vulnerabilities or compatibility issues.
  resolution: Update NPM by running "npm install -g npm@latest" in a terminal.
  platform: darwin
