- name: macOS - Password minimum length ≥10 characters (ISO 27001)
  query: >-
    SELECT 1 FROM (SELECT CAST(lengthtxt AS INTEGER(2)) minlength FROM
    (SELECT SUBSTRING(length, 1, 2) AS lengthtxt FROM
    (SELECT policy_description, policy_identifier, split(policy_content, '{', 1) AS length
    FROM password_policy WHERE policy_identifier LIKE '%minLength'))
    WHERE minlength >= 10);
  critical: false
  description: >-
    Checks that the password policy enforces a minimum password length of 10 or
    more characters. ISO 27001 Annex A control A.5.17 (Authentication
    information) requires that adequate password complexity rules are enforced to
    protect authentication credentials.
  resolution: >-
    Contact your IT administrator to ensure your Mac is receiving an MDM profile
    that enforces a minimum password length of at least 10 characters. This
    should be automatically enforced by Fleet.
  platform: darwin
