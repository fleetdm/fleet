- name: macOS - Automatic update checks enabled (ISO 27001)
  query: SELECT 1 FROM managed_policies WHERE domain = 'com.apple.SoftwareUpdate' AND name = 'AutomaticCheckEnabled' AND value = 1 LIMIT 1;
  critical: false
  description: >-
    Checks that automatic software update checks are enabled via MDM. ISO 27001
    Annex A control A.8.8 (Management of technical vulnerabilities) requires
    that information about technical vulnerabilities is obtained in a timely
    fashion and that systems are kept up to date.
  resolution: >-
    Contact your IT administrator to ensure your Mac is receiving an MDM profile
    that enables automatic software update checks. This should be automatically
    enforced by Fleet.
  platform: darwin
