- name: macOS - 1Password up to date
  query: |
    SELECT 1 FROM apps
    WHERE bundle_identifier = 'com.1password.1password'
    AND bundle_short_version >= '8.10.66';
  critical: true
  description: The host may have an outdated version of 1Password, potentially risking security vulnerabilities or compatibility issues.
  resolution: Update 1Password to the latest version.
  platform: darwin
  calendar_events_enabled: false
  install_software:
    package_path: ../software/1password.yml
