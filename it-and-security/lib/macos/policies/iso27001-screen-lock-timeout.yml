- name: macOS - Screen lock timeout ≤20 minutes (ISO 27001)
  query: >-
    SELECT 1 WHERE
    EXISTS (SELECT CAST(value AS INTEGER(4)) valueint FROM managed_policies WHERE domain = 'com.apple.screensaver' AND name = 'askForPasswordDelay' AND valueint <= 60 LIMIT 1)
    AND EXISTS (SELECT CAST(value AS INTEGER(4)) valueint FROM managed_policies WHERE domain = 'com.apple.screensaver' AND name = 'idleTime' AND valueint <= 1200 LIMIT 1)
    AND EXISTS (SELECT 1 FROM managed_policies WHERE domain = 'com.apple.screensaver' AND name = 'askForPassword' AND value = 1 LIMIT 1);
  critical: false
  description: >-
    Checks that the screen locks after no more than 20 minutes of inactivity and
    that a password is required within 60 seconds. ISO 27001 Annex A control
    A.8.1 (User endpoint devices) requires that information stored in, processed
    by, or accessible via user endpoint devices is protected against
    unauthorized access.
  resolution: >-
    Contact your IT administrator to ensure your Mac is receiving an MDM profile
    that sets screen saver idle time to 1200 seconds or less and password delay
    to 60 seconds or less. This should be automatically enforced by Fleet.
  platform: darwin
