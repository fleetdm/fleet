- name: macOS - Firewall enabled (ISO 27001)
  query: SELECT 1 FROM alf WHERE global_state >= 1;
  critical: false
  description: >-
    Verifies that the macOS Application Layer Firewall is enabled. ISO 27001 control A.13.1
    requires network security controls to protect information in systems and networks.
  resolution: >-
    The macOS firewall should be automatically enforced by the Fleet configuration profile.
    If you are failing this policy, try restarting your Mac and clicking Refetch in Fleet Desktop.
    If the issue persists, contact IT support via #help-dogfooding in Slack.
  platform: darwin
