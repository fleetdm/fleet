- name: macOS - Screen lock enabled (ISO 27001)
  query: SELECT 1 FROM managed_policies WHERE name = 'askForPassword' AND value = '1' LIMIT 1;
  critical: false
  description: >-
    Checks that screen lock is enabled via MDM and a password is required after
    screen saver or display sleep. ISO 27001 Annex A control A.8.1 (User
    endpoint devices) requires that unattended equipment is protected.
  resolution: >-
    Contact your IT administrator to ensure your Mac is receiving an MDM profile
    that enables screen lock with password requirement. This should be
    automatically enforced by Fleet.
  platform: darwin
