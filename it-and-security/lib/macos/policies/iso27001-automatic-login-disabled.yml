- name: macOS - Automatic login disabled (ISO 27001)
  query: SELECT 1 FROM managed_policies WHERE domain = 'com.apple.loginwindow' AND name = 'DisableFDEAutoLogin' AND value = 1 LIMIT 1;
  critical: false
  description: >-
    Checks that automatic login is disabled, ensuring users must authenticate at
    the login screen. ISO 27001 Annex A control A.8.5 (Secure authentication)
    requires that secure sign-on procedures control access to information systems
    and applications.
  resolution: >-
    Contact your IT administrator to ensure your Mac is receiving an MDM profile
    that disables automatic login. This should be automatically enforced by
    Fleet.
  platform: darwin
