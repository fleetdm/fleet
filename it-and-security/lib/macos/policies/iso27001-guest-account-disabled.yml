- name: macOS - Guest account disabled (ISO 27001)
  query: SELECT 1 FROM managed_policies WHERE domain = 'com.apple.MCX' AND name = 'DisableGuestAccount' AND value = '1' LIMIT 1;
  critical: false
  description: >-
    Checks that the guest account is disabled via MDM. ISO 27001 Annex A control
    A.5.15 (Access control) requires that access to information and information
    processing facilities is limited to authorized users, preventing
    unauthorized access through guest accounts.
  resolution: >-
    Contact your IT administrator to ensure your Mac is receiving an MDM profile
    that disables the guest account. This should be automatically enforced by
    Fleet.
  platform: darwin
