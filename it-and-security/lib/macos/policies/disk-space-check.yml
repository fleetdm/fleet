- name: macOS - Sufficient disk space available
  query: SELECT 1 FROM mounts WHERE path = '/' AND CAST(blocks_available AS REAL) / blocks > 0.10;
  critical: false
  description: This policy checks if more than 10% of disk space is available on the primary disk. Devices with 10% or less available disk space will fail this policy.
  resolution: |-
    Free up disk space by removing unnecessary files, emptying the Trash, or uninstalling unused applications.

    If the issue persists, please reach out in #help-dogfooding.
  platform: darwin
