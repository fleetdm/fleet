- name: macOS - Firewall enabled (ISO 27001)
  query: SELECT 1 FROM alf WHERE global_state >= 1;
  critical: false
  description: >-
    Checks that the macOS application firewall is enabled. ISO 27001 Annex A
    control A.8.20 (Network security) requires that networks and network devices
    are secured, managed, and controlled to protect information in systems and
    applications, including filtering unauthorized inbound connections.
  resolution: >-
    Contact your IT administrator to ensure your Mac is receiving an MDM profile
    that enables the macOS firewall. This should be automatically enforced by
    Fleet.
  platform: darwin
