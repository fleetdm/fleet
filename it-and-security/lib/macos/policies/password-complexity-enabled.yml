- name: macOS - Password complexity enforced (ISO 27001 A.9)
  query: |
    SELECT 1 WHERE
      EXISTS (SELECT 1 FROM managed_policies WHERE domain = 'com.apple.configuration.passcode.settings' AND name = 'MinimumLength' AND CAST(value AS INTEGER) >= 10)
      OR EXISTS (SELECT 1 FROM managed_policies WHERE domain = 'com.apple.mobiledevice.passwordpolicy' AND name = 'minLength' AND CAST(value AS INTEGER) >= 10);
  critical: false
  description: |-
    Verifies that a minimum password length of 10 characters is enforced on this Mac via MDM. This supports ISO 27001 Annex A.9 (Access Control).
  resolution: |-
    Password complexity should be automatically enforced by Fleet via the Passcode Settings declaration profile. If you are failing this policy, ensure the MDM profile is installed: System Settings > Profiles.

    If the issue persists, please reach out in #help-dogfooding.
  platform: darwin
