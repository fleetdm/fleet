- name: macOS - Automatic security updates enabled
  query: >-
    SELECT 1 FROM managed_policies
    WHERE domain = 'com.apple.SoftwareUpdate'
    AND name = 'AutomaticallyInstallMacOSUpdates'
    AND value = 1;
  critical: false
  description: >-
    SOC 2 CC7.1 - Automatic installation of macOS security updates must be
    enabled to ensure timely patching of vulnerabilities. This reduces the
    window of exposure to known security threats.
  resolution: >-
    Automatic updates should be enforced via MDM. If this policy is failing,
    please contact IT via #help-it in Slack. You can also enable it manually
    in System Settings > General > Software Update > Automatic Updates.
  platform: darwin
