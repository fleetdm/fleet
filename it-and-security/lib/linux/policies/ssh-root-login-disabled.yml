- name: "Linux - SSH root login disabled"
  query: "SELECT 1 WHERE EXISTS (SELECT * FROM augeas WHERE path='/files/etc/ssh/sshd_config/PermitRootLogin' AND LOWER(value)=LOWER('no'));"
  critical: false
  description: "Ensures SSH root login is disabled. Direct root login should be disabled in favor of using sudo."
  resolution: "Set 'PermitRootLogin no' in /etc/ssh/sshd_config and restart the sshd service."
  platform: linux
  calendar_events_enabled: false
