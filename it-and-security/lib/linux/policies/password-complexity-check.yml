- name: Linux - Password complexity enforced (ISO 27001 A.6.7)
  query: >-
    SELECT 1 WHERE
      EXISTS (
        SELECT 1 FROM file WHERE
          path = '/etc/security/pwquality.conf'
          AND filename = 'pwquality.conf'
      )
      OR EXISTS (
        SELECT 1 FROM deb_packages WHERE name = 'libpam-pwquality' AND status = 'install ok installed'
      )
      OR EXISTS (
        SELECT 1 FROM rpm_packages WHERE name = 'libpwquality'
      );
  critical: false
  description: >-
    ISO 27001 Annex A.6.7 (Remote working / Secure configuration) requires
    appropriate security measures for remote access. This policy checks that password
    quality enforcement (pam_pwquality / libpwquality) is installed on the Linux
    endpoint to ensure password complexity requirements can be enforced.
  resolution: >-
    Install and configure password quality enforcement on your Linux workstation.
    For Debian/Ubuntu: sudo apt install libpam-pwquality. For RHEL/Fedora:
    sudo dnf install libpwquality. Then configure /etc/security/pwquality.conf
    with appropriate settings (e.g., minlen=10, minclass=3, dcredit=-1, ucredit=-1,
    lcredit=-1, ocredit=-1).
  platform: linux
