- name: Linux - Operating system supported (ISO 27001 A.12)
  query: |
    SELECT 1 FROM os_version WHERE
      (platform_like = 'debian' AND (
        (name LIKE '%Ubuntu%' AND (major = '24' OR (major = '22' AND minor = '04') OR (major = '20' AND minor = '04')))
        OR (name LIKE '%Debian%' AND major >= '11')
      ))
      OR (platform_like = 'rhel' AND (
        (name LIKE '%Red Hat%' AND major >= '8')
        OR (name LIKE '%CentOS%' AND major >= '8')
        OR (name LIKE '%Fedora%' AND major >= '39')
      ));
  critical: false
  description: |-
    Verifies that this Linux device is running a supported operating system version that still receives security updates. This supports ISO 27001 Annex A.12 (Operations Security).
  resolution: |-
    Upgrade your Linux operating system to a currently supported version that receives security updates.

    If the issue persists, please reach out in #help-dogfooding.
  platform: linux
