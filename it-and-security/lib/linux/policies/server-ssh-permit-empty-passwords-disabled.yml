- name: "Linux - Server SSH PermitEmptyPasswords disabled"
  query: "SELECT 1 WHERE EXISTS (SELECT * FROM augeas WHERE path='/files/etc/ssh/sshd_config/PermitEmptyPasswords' AND LOWER(value)=LOWER('no'));"
  critical: true
  description: "Ensures empty passwords are not permitted via SSH on the server. This is a critical security control."
  resolution: "Set 'PermitEmptyPasswords no' in /etc/ssh/sshd_config and restart the sshd service."
  platform: linux
  calendar_events_enabled: false
