- name: Linux - SSH PermitRootLogin not set to yes
  query: |-
    SELECT 1 WHERE NOT EXISTS (
      SELECT 1 FROM augeas
      WHERE path = '/etc/ssh/sshd_config'
        AND label = 'PermitRootLogin'
        AND value IN ('yes', 'true', '1')
    );
  critical: false
  description: |-
    Passes if sshd_config does not set PermitRootLogin to yes (absent or set to no/prohibit-password/without-password is OK).
    Requires the augeas osquery table and augeas lenses on the host. Supports ISO 27001 A.8.2 and SOC 2 CC 6.6.
  resolution: |-
    Set `PermitRootLogin no` (or `prohibit-password`) in `/etc/ssh/sshd_config` and restart `sshd`. If this fails because augeas is unavailable, install augeas or use another control.
  platform: linux
