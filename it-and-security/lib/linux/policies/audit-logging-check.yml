- name: Linux - Audit logging enabled (ISO 27001 A.8.24)
  query: >-
    SELECT 1 WHERE
      EXISTS (
        SELECT 1 FROM services WHERE name = 'auditd' AND status = 'RUNNING'
      )
      OR EXISTS (
        SELECT 1 FROM services WHERE name = 'systemd-journald' AND status = 'RUNNING'
      );
  critical: false
  description: >-
    ISO 27001 Annex A.8.24 (Use of cryptography / Logging) requires that activities,
    exceptions, faults, and other relevant events are logged and monitored. This policy
    checks that the Linux audit daemon (auditd) or systemd-journald is running to
    ensure system events are being recorded for security monitoring and incident response.
  resolution: >-
    Enable audit logging on your Linux workstation. For auditd:
    sudo apt install auditd (Debian/Ubuntu) or sudo dnf install audit (RHEL/Fedora),
    then sudo systemctl enable --now auditd. Ensure systemd-journald is running:
    sudo systemctl enable --now systemd-journald.
  platform: linux
