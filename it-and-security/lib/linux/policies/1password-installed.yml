- name: Linux - 1Password installed
  query: SELECT 1 FROM deb_packages WHERE name = '1password' UNION SELECT 1 FROM rpm_packages WHERE name = '1password';
  install_software:
    package_path: ../software/1password-deb.yml
  critical: false
  description: Our SOC 2 policies require a password manager to be installed on all workstations.
  resolution: 1Password should be automatically installed. If it is missing, install it from self-service.
  platform: linux
  calendar_events_enabled: false
