- name: Linux - SSH password authentication disabled
  query: SELECT 1 FROM ssh_configs WHERE key = 'PasswordAuthentication' AND value = 'no';
  critical: false
  description: Checks that SSH password authentication is disabled in favor of key-based authentication.
  resolution: "Set 'PasswordAuthentication no' in /etc/ssh/sshd_config and restart the SSH service."
  platform: linux
  calendar_events_enabled: false
