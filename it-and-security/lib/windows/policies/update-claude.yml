- name: Windows - Claude up to date
  query: |
    SELECT 1 WHERE EXISTS (
      SELECT 1 FROM programs WHERE name LIKE 'Claude%%'
    ) AND NOT EXISTS (
      SELECT 1 FROM programs WHERE name LIKE 'Claude%%' AND
        version < (SELECT value FROM fleet_maintained_app_latest_version)
    );
  critical: false
  description: "Checks that Claude is up to date on Windows. If this policy fails, Claude will be updated to the latest version."
  resolution: "Update Claude to the latest version."
  platform: windows
  calendar_events_enabled: false
  install_software:
    package_type: fleet_maintained
