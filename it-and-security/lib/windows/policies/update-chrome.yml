- name: Windows - Chrome up to date
  query: SELECT 1 WHERE NOT EXISTS (SELECT 1 FROM programs WHERE name = 'Google Chrome') OR EXISTS (SELECT 1 FROM programs WHERE name = 'Google Chrome' AND version_compare(version, '143.0.7499.192') >= 0);
  critical: false
  description: The host may have an outdated version of Google Chrome, potentially risking security vulnerabilities (CVE-2026-0628) or compatibility issues.
  resolution: Check for updates using Chrome's built-in update functionality or download the latest version from self-service.
  platform: windows
