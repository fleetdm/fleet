- name: Windows - Password hints disabled on login screen
  query: >-
    SELECT 1 FROM registry
    WHERE path = 'HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\DontDisplayLastUserName'
    AND data = '1';
  critical: false
  description: >-
    SOC 2 CC6 - The Windows login screen must not display the last logged-in
    user name or provide password hints. This prevents unauthorized users from
    identifying valid user accounts on the workstation.
  resolution: >-
    This setting should be enforced automatically via MDM profile. If this policy
    is failing, please contact IT via #help-it in Slack.
  platform: windows
