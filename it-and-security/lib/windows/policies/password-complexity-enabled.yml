- name: Windows - Password complexity enforced (ISO 27001 A.9)
  query: |
    SELECT 1 FROM security_profile_info WHERE minimum_password_length >= 10;
  critical: false
  description: |-
    Verifies that a minimum password length of 10 characters is enforced on this Windows device. This supports ISO 27001 Annex A.9 (Access Control).
  resolution: |-
    Password complexity should be automatically enforced by Fleet via MDM configuration profiles. If you are failing this policy, ensure the MDM profile has been applied successfully.

    If the issue persists, please reach out in #help-dogfooding.
  platform: windows
