- name: Windows - Event logging enabled (ISO 27001 A.8.24)
  query: >-
    SELECT 1 WHERE
      EXISTS (SELECT 1 FROM services WHERE name = 'EventLog' AND status = 'RUNNING')
      AND EXISTS (SELECT 1 FROM services WHERE name = 'EventSystem' AND status = 'RUNNING');
  critical: false
  description: >-
    ISO 27001 Annex A.8.24 requires that activities, exceptions, faults, and other
    relevant events are logged and monitored. This policy checks that the Windows
    Event Log service and Event System service are running to ensure system events
    are being recorded for security monitoring and incident response.
  resolution: >-
    Ensure the Windows Event Log service is running. Open Services (services.msc),
    find "Windows Event Log" and "COM+ Event System", and ensure both are set to
    Automatic and are running. If they are stopped, start them and set the startup
    type to Automatic.
  platform: windows
