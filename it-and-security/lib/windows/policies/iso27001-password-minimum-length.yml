- name: Windows - Minimum password length (ISO 27001)
  query: SELECT 1 FROM security_profile_info WHERE minimum_password_length >= 14;
  critical: false
  description: >-
    Checks that the minimum password length is set to 14 characters or more.
    ISO 27001 Annex A control A.8.5 (Secure authentication) requires strong
    authentication mechanisms including password complexity requirements.
  resolution: >-
    Ask your system administrator to configure the minimum password length to 14
    or more characters via Group Policy: Computer Configuration > Policies >
    Windows Settings > Security Settings > Account Policies > Password Policy.
  platform: windows
