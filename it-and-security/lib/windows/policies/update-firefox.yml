- name: "Windows - Firefox up to date"
  query: "SELECT 1 FROM programs WHERE name LIKE 'Mozilla Firefox%' AND version >= (SELECT JSON_EXTRACT(json, '$.LATEST_FIREFOX') FROM (SELECT content AS json FROM curl WHERE url = 'https://product-details.mozilla.org/1.0/firefox_versions.json') AS subquery);"
  critical: false
  description: "Checks that Mozilla Firefox is installed and up to date on Windows."
  resolution: "Install or update Mozilla Firefox to the latest version."
  platform: windows
