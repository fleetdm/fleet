- name: Windows - Firewall enabled (ISO 27001 A.13)
  query: |
    SELECT 1 WHERE NOT EXISTS (
      SELECT 1 FROM registry
      WHERE path IN (
        'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\DomainProfile\EnableFirewall',
        'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\StandardProfile\EnableFirewall',
        'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\PublicProfile\EnableFirewall'
      )
      AND data = '0'
    );
  critical: false
  description: |-
    Verifies that Windows Firewall is enabled for all network profiles (Domain, Private, Public). This supports ISO 27001 Annex A.13 (Communications Security).
  resolution: |-
    The firewall should be automatically enforced by Fleet via MDM configuration profiles. If you are failing this policy, enable Windows Firewall: Settings > Privacy & Security > Windows Security > Firewall & network protection.

    If the issue persists, please reach out in #help-dogfooding.
  platform: windows
