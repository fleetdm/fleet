- name: Windows - Audit logging enabled (ISO 27001 A.12.4)
  query: |
    SELECT 1 FROM services WHERE name = 'EventLog' AND status = 'RUNNING';
  critical: false
  description: |-
    Verifies that the Windows Event Log service is running, ensuring security events are logged. This supports ISO 27001 Annex A.12.4 (Logging and Monitoring).
  resolution: |-
    The Windows Event Log service should be running by default. If you are failing this policy, open Services (services.msc) and ensure "Windows Event Log" is started and set to Automatic.

    If the issue persists, please reach out in #help-dogfooding.
  platform: windows
