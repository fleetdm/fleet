- name: x86 Windows hosts with Slack installed
  description: x86 Windows hosts with Slack installed
  query: SELECT 1 FROM programs WHERE name = 'Slack' AND EXISTS (SELECT 1 FROM os_version WHERE arch NOT LIKE 'ARM%');
