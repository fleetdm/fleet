- name: SSH keys encrypted (ISO 27001)
  query: SELECT 1 WHERE NOT EXISTS (SELECT 1 FROM users CROSS JOIN user_ssh_keys USING (uid) WHERE encrypted = '0');
  critical: false
  description: Checks that all SSH keys on the system are encrypted with a passphrase. ISO 27001 A.8.24 (Use of cryptography) requires cryptographic controls to protect sensitive authentication material.
  resolution: "Use this command to encrypt existing SSH keys: ssh-keygen -o -p -f /path/to/file"
  platform: darwin,linux,windows
