name: "🧪 Testing & QA"
settings:
  features:
    enable_host_users: true
    enable_software_inventory: true
  host_expiry_settings:
    host_expiry_enabled: true
    host_expiry_window: 30
  secrets:
    - secret: $DOGFOOD_TESTING_AND_QA_ENROLL_SECRET
agent_options:
  config:
    options:
      pack_delimiter: /
      logger_tls_period: 10
      distributed_plugin: tls
      disable_distributed: false
      logger_tls_endpoint: /api/osquery/log
      distributed_interval: 10
      distributed_tls_max_attempts: 3
    decorators:
      load:
        - SELECT uuid AS host_uuid FROM system_info;
        - SELECT hostname AS hostname FROM system_info;
    # macOS FIM scope
    file_paths:
      system_binaries:
        - /usr/bin/%%
        - /usr/sbin/%%
        - /bin/%%
        - /sbin/%%
      launch_items:
        - /Library/LaunchAgents/%%
        - /Library/LaunchDaemons/%%
        - /Users/%/Library/LaunchAgents/%%
      etc:
        - /etc/%%
        - /private/etc/%%
    exclude_paths:
      etc:
        - /private/etc/cups/%%
        - /private/etc/newsyslog.d/%%
  command_line_flags:
    # Primary switch for the eventing system
    disable_events: false
    # Buffer / retention
    events_max: 50000
    events_expiry: 86400
    events_optimize: true
    # Watchdog headroom so evented workloads don't get killed
    watchdog_memory_limit: 350
    watchdog_utilization_limit: 130
    # --- macOS FIM ---
    enable_file_events: true
    # --- Linux process + socket auditing via the audit framework ---
    disable_audit: false
    audit_allow_process_events: true
    audit_allow_sockets: true
    audit_persist: true
    # --- Windows process auditing via ETW ---
    enable_process_etw_events: true
  update_channels:
    osqueryd: edge
    orbit: edge
    desktop: edge
controls:
  setup_experience:
    macos_bootstrap_package: ""
    enable_end_user_authentication: true
    apple_setup_assistant:
  macos_updates:
    deadline:
    minimum_version:
  enable_disk_encryption: true
  scripts:
    # macOS scripts
    - path: ../lib/macos/scripts/uninstall-fleetd-macos.sh
    # Windows scripts
    - path: ../lib/windows/scripts/uninstall-fleetd-windows.ps1
    # Linux scripts
    - path: ../lib/linux/scripts/uninstall-fleetd-linux.sh
    - path: ../lib/linux/scripts/install-fleet-desktop-required-extension.sh
policies:
  # macOS policies - CIS Level 1 benchmarks
  - path: ../lib/macos/policies/all-software-updates-installed.yml
  - path: ../lib/macos/policies/firewall-enabled.yml
  - path: ../lib/macos/policies/gatekeeper-enabled.yml
  - path: ../lib/macos/policies/disk-encryption-check.yml
  - path: ../lib/macos/policies/remote-login-disabled.yml
  - path: ../lib/macos/policies/screen-lock-inactivity.yml
  - path: ../lib/macos/policies/sip-enabled.yml
  - path: ../lib/macos/policies/local-admin-count-reasonable.yml
  # Linux policies
  - path: ../lib/linux/policies/check-fleet-desktop-extension-enabled.yml
reports:
software:
  packages:
    # Linux apps
  fleet_maintained_apps:
    # macOS apps
    # Windows apps
