name: ☁️ IT servers

team_settings:
  features:
    enable_host_users: true
    enable_software_inventory: true
  host_expiry_settings:
    host_expiry_enabled: true
    host_expiry_window: 30
  secrets:
    - secret: $SERVERS_ENROLL_SECRET

agent_options:
  path: ../lib/all/agent-options/servers.agent-options.yml

controls:
  enable_disk_encryption: true
  scripts:
    - path: ../lib/linux/scripts/uninstall-fleetd-linux.sh

policies:
  - path: ../lib/linux/policies/server-disk-encryption-check.yml
  - path: ../lib/linux/policies/server-disk-space-check.yml
  - path: ../lib/linux/policies/server-ssh-permit-empty-passwords-disabled.yml
  - path: ../lib/linux/policies/server-ssh-root-login-disabled.yml

software:
  packages:
    - path: ../lib/linux/software/1password-deb.yml
    - path: ../lib/linux/software/1password-rpm.yml
