{{- if and .Values.gatewayApi.enabled .Values.gatewayApi.grpcRoute.enabled -}}
{{- $serviceName := include "fleet.servicename" . -}}
{{- $svcPort := ternary .Values.fleet.listenPort .Values.fleet.servicePort (eq .Values.fleet.servicePort nil) -}}
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: {{ include "fleet.fullname" . }}-grpc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.labels" . | nindent 4 }}
    {{- with .Values.gatewayApi.grpcRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.gatewayApi.grpcRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.gatewayApi.gateway.enabled }}
    - name: {{ include "fleet.fullname" . }}-gateway
      namespace: {{ .Release.Namespace }}
      {{- with .Values.gatewayApi.grpcRoute.sectionName }}
      sectionName: {{ . }}
      {{- end }}
    {{- else }}
    {{- range .Values.gatewayApi.grpcRoute.parentRefs }}
    - name: {{ .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
      {{- with .port }}
      port: {{ . }}
      {{- end }}
    {{- end }}
    {{- end }}
  {{- if .Values.gatewayApi.grpcRoute.hostnames }}
  hostnames:
    {{- range .Values.gatewayApi.grpcRoute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.gatewayApi.grpcRoute.rules }}
    {{- toYaml .Values.gatewayApi.grpcRoute.rules | nindent 4 }}
    {{- else }}
    - backendRefs:
        - name: {{ $serviceName }}
          port: {{ $svcPort }}
    {{- end }}
{{- end }}
