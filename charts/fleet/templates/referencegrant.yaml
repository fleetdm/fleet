{{- if and .Values.gatewayApi.enabled .Values.gatewayApi.referenceGrant.enabled -}}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ include "fleet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.labels" . | nindent 4 }}
    {{- with .Values.gatewayApi.referenceGrant.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.gatewayApi.referenceGrant.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  from:
    {{- toYaml .Values.gatewayApi.referenceGrant.from | nindent 4 }}
  to:
    - group: ""
      kind: Service
      {{- with .Values.gatewayApi.referenceGrant.toServiceName }}
      name: {{ . }}
      {{- end }}
{{- end }}
