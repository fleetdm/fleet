name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'e2e'
        type: choice
        options:
          - e2e
          - loadtest

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci
        working-directory: qa/playwright

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: qa/playwright

      - name: Run E2E suite
        if: ${{ github.event.inputs.suite == 'e2e' }}
        run: npx playwright test --project=e2e-setup --project=e2e
        working-directory: qa/playwright
        env:
          FLEET_URL: ${{ secrets.FLEET_E2E_URL }}
          FLEET_ADMIN_EMAIL: ${{ secrets.FLEET_E2E_ADMIN_EMAIL }}
          FLEET_ADMIN_PASSWORD: ${{ secrets.FLEET_E2E_ADMIN_PASSWORD }}

      - name: Run Loadtest suite
        if: ${{ github.event.inputs.suite == 'loadtest' }}
        run: npx playwright test --project=loadtest-setup --project=loadtest
        working-directory: qa/playwright
        env:
          FLEET_URL: ${{ secrets.FLEET_LOADTEST_URL }}
          FLEET_ADMIN_EMAIL: ${{ secrets.FLEET_LOADTEST_ADMIN_EMAIL }}
          FLEET_ADMIN_PASSWORD: ${{ secrets.FLEET_LOADTEST_ADMIN_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: qa/playwright/playwright-report/
          retention-days: 30
